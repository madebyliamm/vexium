<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Analytics — Vexium</title>
  <link rel="icon" type="image/png" href="logo_background.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    a{color:inherit;text-decoration:none} a:visited{color:inherit}
    :root{
      --bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;
      --b1:#262626;--b2:#333333;--b3:#444444;
      --text:#ffffff;--sub:#666666;
      --ok:#4ade80;--err:#f87171;--warn:#fbbf24;
      --sans:'Plus Jakarta Sans',sans-serif;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}

    /* TOPBAR */
    #topbar{position:sticky;top:0;z-index:200;height:48px;padding:0 clamp(12px,2vw,24px);display:flex;align-items:center;gap:12px;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1)}
    .tb-logo img{width:30px;height:30px;border-radius:6px;display:block;transition:transform 60ms ease-out}
    .tb-logo:hover img{transform:scale(1.08)}
    .tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .tb-pfp{width:28px;height:28px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#000 !important;cursor:pointer;flex-shrink:0;text-decoration:none}

    /* PAGE */
    .page{max-width:clamp(800px,88vw,1320px);margin:0 auto;padding:clamp(28px,4vw,56px) clamp(16px,4vw,56px)}
    .page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:12px;flex-wrap:wrap}
    .page-title{font-size:clamp(20px,2.2vw,32px);font-weight:800;letter-spacing:-.5px}
    .page-sub{font-size:13px;color:var(--sub);margin-top:4px}
    .head-controls{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}

    /* RANGE PILLS */
    .range-pills{display:flex;gap:4px}
    .range-pill{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;background:transparent;border:none;color:var(--sub);cursor:pointer;font-family:var(--sans);transition:all .15s}
    .range-pill.active,.range-pill:hover{background:var(--s2);color:var(--text)}

    /* PROJECT DROPDOWN */
    .proj-dd-wrap{position:relative}
    .proj-dd-btn{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;background:var(--s1);border:none;color:var(--text);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:background .15s;white-space:nowrap;max-width:200px}
    .proj-dd-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;flex-shrink:0;transition:transform .15s}
    .proj-dd-btn.open svg{transform:rotate(180deg)}
    .proj-dd-btn span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .proj-dd-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:200px;background:var(--s1);border-radius:12px;padding:4px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none}
    .proj-dd-menu.open{display:block}
    .proj-dd-opt{padding:9px 12px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px;color:var(--sub)}
    .proj-dd-opt:hover{background:var(--s2);color:var(--text)}
    .proj-dd-opt.active{color:var(--text);font-weight:700}
    .proj-dd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    /* STAT CARDS */
    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
    @media(max-width:700px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
    .stat-card{border-radius:14px;padding:20px 22px;cursor:pointer;transition:opacity .15s,box-shadow .2s;user-select:none}
    .stat-card:nth-child(1){background:rgba(96,165,250,.08)}
    .stat-card:nth-child(2){background:rgba(167,139,250,.08)}
    .stat-card:nth-child(3){background:rgba(74,222,128,.08)}
    .stat-card:nth-child(4){background:rgba(251,191,36,.08)}
    .stat-card.active:nth-child(1){box-shadow:0 0 0 2px rgba(96,165,250,.5)}
    .stat-card.active:nth-child(2){box-shadow:0 0 0 2px rgba(167,139,250,.5)}
    .stat-card.active:nth-child(3){box-shadow:0 0 0 2px rgba(74,222,128,.5)}
    .stat-card.active:nth-child(4){box-shadow:0 0 0 2px rgba(251,191,36,.5)}
    .stat-card:not(.active){opacity:.5}
    .stat-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .stat-card:nth-child(1) .stat-label{color:rgba(96,165,250,.9)}
    .stat-card:nth-child(2) .stat-label{color:rgba(167,139,250,.9)}
    .stat-card:nth-child(3) .stat-label{color:rgba(74,222,128,.9)}
    .stat-card:nth-child(4) .stat-label{color:rgba(251,191,36,.9)}
    .stat-label svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .stat-value{font-size:clamp(26px,2.4vw,34px);font-weight:800;letter-spacing:-.5px;line-height:1;margin-bottom:6px}
    .stat-value.empty{color:var(--b3)}
    .stat-meta{font-size:11px;font-weight:600;color:var(--sub)}

    /* CHART */
    .chart-section{background:var(--s1);border-radius:16px;padding:24px 28px;margin-bottom:10px}
    .chart-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
    .chart-title{font-size:13px;font-weight:700;letter-spacing:-.1px;margin-bottom:3px}
    .chart-meta{font-size:11px;font-weight:700;color:var(--sub)}
    .chart-controls{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
    .chart-pill-row{display:flex;gap:2px}
    .chart-pill{padding:5px 11px;border-radius:999px;font-size:11px;font-weight:700;background:transparent;border:none;color:var(--sub);cursor:pointer;font-family:var(--sans);transition:all .15s}
    .chart-pill.active,.chart-pill:hover{background:var(--s2);color:var(--text)}
    .chart-area{display:flex;flex-direction:column;gap:8px}
    .bar-chart{display:flex;align-items:flex-end;gap:4px;height:160px;width:100%}
    .bar{flex:1;border-radius:8px 8px 0 0;min-height:3px;transition:opacity .12s;cursor:default}
    .bar:hover{opacity:.7}
    .bar-labels{display:flex;gap:4px}
    .bar-label{flex:1;font-size:9px;color:var(--sub);text-align:center;overflow:hidden;white-space:nowrap}

    /* stacked bar segments */
    .bar-stack{flex:1;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-end;gap:0;min-height:3px}
    .bar-seg{min-height:3px;transition:opacity .12s;cursor:default}
    .bar-seg:hover{opacity:.7}
    .bar-seg:first-child{border-radius:8px 8px 0 0}
    .bar-seg:last-child{border-radius:0}

    /* tooltip */
    #chartTip{position:fixed;pointer-events:none;z-index:9999;display:none;background:rgba(14,14,14,.96);border-radius:10px;padding:9px 13px;backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(0,0,0,.5);min-width:120px}
    #chartTipName{font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.8);margin-bottom:2px}
    #chartTipVal{font-size:11px;font-weight:600;color:var(--sub)}

    /* color key */
    .color-key{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.04)}
    .color-key-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--sub)}
    .color-key-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    /* empty state */
    .chart-empty{height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
    .chart-empty-icon{width:36px;height:36px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center}
    .chart-empty-icon svg{width:16px;height:16px;stroke:var(--sub);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .chart-empty-t{font-size:13px;font-weight:700;color:var(--sub)}
    .chart-empty-s{font-size:11px;color:var(--b3);text-align:center;max-width:260px;line-height:1.5}

    /* DETAIL */
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    @media(max-width:760px){.detail-grid{grid-template-columns:1fr}}
    .detail-card{background:var(--s1);border-radius:16px;padding:22px 24px}
    .detail-card-title{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--sub);margin-bottom:16px}
    .detail-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.035);gap:12px}
    .detail-row:last-child{border-bottom:none}
    .detail-row-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;min-width:0}
    .detail-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .detail-row-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .detail-row-val{font-size:12px;font-weight:700;color:var(--sub);flex-shrink:0}
    .detail-bar-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.035)}
    .detail-bar-row:last-child{border-bottom:none}
    .detail-bar-label{font-size:12px;font-weight:600;color:var(--sub);width:72px;flex-shrink:0;text-transform:capitalize;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .detail-bar-track{flex:1;height:6px;background:var(--s2);border-radius:99px;overflow:hidden}
    .detail-bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
    .detail-bar-pct{font-size:11px;font-weight:700;width:32px;text-align:right;flex-shrink:0;color:var(--sub)}
    .detail-empty{font-size:11px;color:var(--b3);padding:12px 0;text-align:center}

    /* coming soon */
    .coming-card{background:rgba(251,191,36,.06);border-radius:16px;padding:48px 24px;text-align:center;margin-bottom:10px}
    .coming-card .cs-t{font-size:15px;font-weight:800;letter-spacing:-.2px;margin-bottom:6px;color:rgba(251,191,36,.9)}
    .coming-card .cs-s{font-size:12px;color:var(--sub);line-height:1.6;max-width:320px;margin:0 auto}
    .coming-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;background:rgba(251,191,36,.12);font-size:10px;font-weight:700;color:rgba(251,191,36,.8)}
    .coming-pill::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--warn);flex-shrink:0}
  </style>
</head>
<body>

<div id="topbar">
  <a href="home.html" class="tb-logo"><img src="vexium_logo.png" alt="Vexium"/></a>
  <div class="tb-right">
    <a href="profile.html" class="tb-pfp" id="tbPfp">?</a>
  </div>
</div>

<div class="page">
  <div class="page-head">
    <div>
      <div class="page-title">Analytics</div>
      <div class="page-sub" id="pageSub">Loading…</div>
    </div>
    <div class="head-controls">
      <!-- Project picker -->
      <div class="proj-dd-wrap" id="projDdWrap">
        <button class="proj-dd-btn" id="projDdBtn" onclick="toggleDd()">
          <span id="projDdLabel">All projects</span>
          <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="proj-dd-menu" id="projDdMenu">
          <div class="proj-dd-opt active" data-id="all" onclick="selectProject('all')">
            <div class="proj-dd-dot" style="background:var(--b3)"></div>
            All projects
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Stat cards -->
  <div class="stat-grid">
    <div class="stat-card active" data-metric="visitors" onclick="selectMetric('visitors')">
      <div class="stat-label">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Unique Visitors
      </div>
      <div class="stat-value empty" id="statVisitors">—</div>
      <div class="stat-meta" id="statVisitorsMeta">—</div>
    </div>
    <div class="stat-card" data-metric="views" onclick="selectMetric('views')">
      <div class="stat-label">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Visits
      </div>
      <div class="stat-value empty" id="statViews">—</div>
      <div class="stat-meta" id="statViewsMeta">—</div>
    </div>
    <div class="stat-card" data-metric="sites" onclick="selectMetric('sites')">
      <div class="stat-label">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Public Projects
      </div>
      <div class="stat-value empty" id="statSites">—</div>
      <div class="stat-meta" id="statSitesMeta">—</div>
    </div>
    <div class="stat-card" data-metric="revenue" onclick="selectMetric('revenue')">
      <div class="stat-label">
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Revenue
        <span class="coming-pill">Soon</span>
      </div>
      <div class="stat-value empty">—</div>
      <div class="stat-meta">Coming soon</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-section">
    <div class="chart-head">
      <div>
        <div class="chart-title" id="chartTitle">Visitors over time</div>
        <div class="chart-meta" id="chartMeta"></div>
      </div>
      <div id="chartControls"></div>
    </div>
    <div id="chartInner">
      <div class="chart-empty">
        <div class="chart-empty-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <div class="chart-empty-t">Loading…</div>
      </div>
    </div>
  </div>

  <!-- Detail -->
  <div id="detailSection"></div>
</div>

<script>
  const SUPABASE_URL  = 'https://ciuqhxrxcznmgorjeumz.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpdXFoeHJ4Y3pubWdvcmpldW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ1MDkxOTUsImV4cCI6MjA2MDA4NTE5NX0.ZKHdTLSEsQYKmVnM3T9gJ59l8U6V6DYxHFrcrOmXMM4';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Per-metric accent colors
  const METRIC_COLOR = { visitors:'#60a5fa', views:'#a78bfa', sites:'#4ade80', revenue:'#fbbf24' };

  // Project palette — assigned in order
  const PALETTE = ['#60a5fa','#a78bfa','#4ade80','#fbbf24','#f87171','#34d399','#f472b6','#38bdf8','#fb923c','#e879f9'];

  let _projects    = [];
  let _views       = [];
  let _days        = 7;       // default 7d
  let _metric      = 'visitors';
  let _selectedPid = 'all';
  let _mode        = 'overall'; // cumulative is default
  let _chartZoneData = {};     // populated by buildMultiLineGraph for hover zones

  // ── utils ──────────────────────────────────────────────────────────────────
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmt(n){
    if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M';
    if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'')+'k';
    return String(n);
  }
  function setVal(id, val, empty){
    const el = document.getElementById(id);
    if(!el) return;
    el.textContent = val;
    el.classList.toggle('empty', !!empty);
  }
  function projectColor(pid){
    const idx = _projects.findIndex(p=>p.id===pid);
    return PALETTE[idx % PALETTE.length] || '#888';
  }

  // ── dropdown ───────────────────────────────────────────────────────────────
  function toggleDd(){
    const btn  = document.getElementById('projDdBtn');
    const menu = document.getElementById('projDdMenu');
    btn.classList.toggle('open');
    menu.classList.toggle('open');
  }
  document.addEventListener('click', e=>{
    if(!e.target.closest('#projDdWrap')){
      document.getElementById('projDdBtn').classList.remove('open');
      document.getElementById('projDdMenu').classList.remove('open');
    }
  });
  function selectProject(pid){
    _selectedPid = pid;
    document.getElementById('projDdLabel').textContent = pid==='all' ? 'All projects' : (_projects.find(p=>p.id===pid)?.name||'Project');
    document.querySelectorAll('.proj-dd-opt').forEach(o=>o.classList.toggle('active', o.dataset.id===pid));
    toggleDd();
    render();
  }

  // ── metric selection ───────────────────────────────────────────────────────
  function selectMetric(m){
    _metric = m;
    document.querySelectorAll('.stat-card').forEach(c=>c.classList.toggle('active', c.dataset.metric===m));
    render();
  }

  // ── mode selection (cumulative vs daily/over-time) ────────────────────────
  function selectMode(m){
    _mode = m;
    if(m === 'daily') _days = 7; // reset to 7d when switching to over time
    loadData();
  }

  function setChartDays(d){
    _days = d;
    loadData();
  }

  // ── inject chart controls (mode + range pills) ────────────────────────────
  function buildChartControls(){
    const modeRow = `<div class="chart-pill-row">
      <button class="chart-pill ${_mode==='overall'?'active':''}" onclick="selectMode('overall')">Cumulative</button>
      <button class="chart-pill ${_mode==='daily'?'active':''}" onclick="selectMode('daily')">Over time</button>
    </div>`;
    const rangeRow = `<div class="chart-pill-row">
      <button class="chart-pill ${_days===7?'active':''}" onclick="setChartDays(7)">7d</button>
      <button class="chart-pill ${_days===30?'active':''}" onclick="setChartDays(30)">30d</button>
      <button class="chart-pill ${_days===365?'active':''}" onclick="setChartDays(365)">All time</button>
    </div>`;
    return `<div class="chart-controls">${modeRow}${rangeRow}</div>`;
  }

  // ── SVG line graph for cumulative mode ────────────────────────────────────
  function buildLineGraph(counts, labels, color, metricLabel){
    const n = counts.length;
    if(!n) return '';
    const max  = Math.max(...counts, 1);
    const W = 1000, H = 140, padT = 12;
    const pts = counts.map((c,i)=>({
      x: n > 1 ? (i/(n-1))*W : W/2,
      y: padT + (1 - c/max) * (H - padT),
      c, lbl: labels[i]
    }));
    const linePath = pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
    const areaPath = `${linePath} L${pts[n-1].x.toFixed(1)} ${H} L${pts[0].x.toFixed(1)} ${H} Z`;
    const gradId   = 'lg'+color.replace('#','');
    const showEvery = n<=7?1:n<=14?2:5;
    const circles = pts.map((p,i)=>
      `<circle class="line-pt" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${n>60?2.5:4}" fill="${color}" stroke="var(--s1)" stroke-width="2" data-tip-name="${esc(p.lbl)}" data-tip-val="${p.c} ${metricLabel}" style="cursor:default"/>`
    ).join('');
    const labelHtml = pts.map((p,i)=>
      `<div class="bar-label">${i%showEvery===0||i===n-1?p.lbl:''}</div>`
    ).join('');
    return `<div class="chart-area">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:140px;overflow:visible" preserveAspectRatio="none">
        <defs>
          <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${color}" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        <path d="${areaPath}" fill="url(#${gradId})"/>
        <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${circles}
      </svg>
      <div class="bar-labels">${labelHtml}</div>
    </div>`;
  }

  // ── filtered views for current project selection ───────────────────────────
  function activeViews(){
    if(_selectedPid==='all') return _views;
    return _views.filter(v=>v.project_id===_selectedPid);
  }

  // ── bucket helpers ─────────────────────────────────────────────────────────
  function makeDayKeys(days){
    const useWeeks = days > 60;
    const keys=[], labels=[];
    const seen = new Set();
    for(let i=days-1;i>=0;i--){
      const d = new Date(Date.now()-i*86400000);
      const key = useWeeks ? `W${Math.ceil(d.getDate()/7)}-${d.getMonth()}` : d.toISOString().slice(0,10);
      if(seen.has(key)) continue;
      seen.add(key);
      keys.push(key);
      const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
      labels.push(useWeeks ? mo : (_days<=7 ? ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] : `${mo} ${d.getDate()}`));
    }
    return {keys,labels,useWeeks};
  }
  function viewsToKey(v, useWeeks){
    const d = new Date(v.ts);
    return useWeeks ? `W${Math.ceil(d.getDate()/7)}-${d.getMonth()}` : v.ts.slice(0,10);
  }

  // ── render ─────────────────────────────────────────────────────────────────
  function render(){
    updateStats();
    renderChart();
    renderDetail();
  }

  function updateStats(){
    const av = activeViews();
    const rangeLabel     = _days===365 ? '12 months' : `${_days}d`;

    // Unique Visitors = distinct persistent device IDs (visitor_id from localStorage)
    const uniqueVisitors = new Set(av.map(v=>v.visitor_id).filter(Boolean)).size;
    setVal('statVisitors', uniqueVisitors ? fmt(uniqueVisitors) : '—', !uniqueVisitors);
    document.getElementById('statVisitorsMeta').textContent = uniqueVisitors ? `Last ${rangeLabel}` : 'No data yet';

    // Visits = distinct sessions (session_id from sessionStorage — new each time site is opened)
    const visits = new Set(av.map(v=>v.session_id).filter(Boolean)).size;
    setVal('statViews', visits ? fmt(visits) : '—', !visits);
    document.getElementById('statViewsMeta').textContent = visits ? `Last ${rangeLabel}` : 'No data yet';

    const projectsWithData = new Set(av.map(v=>v.project_id)).size;
    const publicCount = _projects.filter(p=>p.is_public).length;
    setVal('statSites', publicCount ? fmt(publicCount) : '—', !publicCount);
    document.getElementById('statSitesMeta').textContent = _projects.length
      ? `${projectsWithData} with traffic`
      : 'No projects yet';
  }

  function renderChart(){
    const inner   = document.getElementById('chartInner');
    const titleEl = document.getElementById('chartTitle');
    const metaEl  = document.getElementById('chartMeta');
    const isAll   = _selectedPid === 'all';
    const av      = activeViews();

    if(_metric === 'revenue'){
      document.getElementById('chartControls').innerHTML = '';
      titleEl.textContent = 'Revenue over time';
      metaEl.textContent  = '';
      inner.innerHTML = `<div class="chart-empty">
        <div class="chart-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(251,191,36,.6)" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <div class="chart-empty-t" style="color:rgba(251,191,36,.7)">Revenue tracking coming soon</div>
        <div class="chart-empty-s">Connect your payment provider and revenue data will appear here automatically.</div>
      </div>`;
      return;
    }

    if(_metric === 'sites'){
      document.getElementById('chartControls').innerHTML = '';
      titleEl.textContent = 'Views by site';
      metaEl.textContent  = av.length ? fmt(av.length)+' total views' : '';
      if(!av.length){
        inner.innerHTML = `<div class="chart-empty"><div class="chart-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><div class="chart-empty-t">No site data yet</div><div class="chart-empty-s">Views will appear here once your sites get traffic.</div></div>`;
        return;
      }
      const byProject = {};
      av.forEach(v=>{ byProject[v.project_id]=(byProject[v.project_id]||0)+1; });
      const entries = _projects.map(p=>({ id:p.id, name:p.name||'Untitled', count:byProject[p.id]||0 }))
        .sort((a,b)=>b.count-a.count).slice(0,8);
      const max = Math.max(...entries.map(e=>e.count),1);
      inner.innerHTML = `<div style="display:flex;flex-direction:column;gap:10px;padding:4px 0">${
        entries.map(e=>`<div style="display:flex;align-items:center;gap:12px">
          <div style="font-size:12px;font-weight:600;color:var(--sub);width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.name)}</div>
          <div style="flex:1;height:8px;background:var(--s2);border-radius:99px;overflow:hidden"><div style="height:100%;width:${Math.max(2,Math.round(e.count/max*100))}%;background:${projectColor(e.id)};border-radius:99px"></div></div>
          <div style="font-size:11px;font-weight:700;color:var(--sub);width:36px;text-align:right;flex-shrink:0">${e.count?fmt(e.count):'—'}</div>
        </div>`).join('')
      }</div>`;
      return;
    }

    // Time series: visitors or views — inject controls
    document.getElementById('chartControls').innerHTML = buildChartControls();

    const isVisitors = _metric === 'visitors';
    const modeLabel  = _mode === 'overall' ? 'cumulative' : 'over time';
    titleEl.textContent = isVisitors ? `Unique visitors ${modeLabel}` : `Visits ${modeLabel}`;
    const {keys,labels,useWeeks} = makeDayKeys(_days);

    if(!av.length){
      metaEl.textContent = '';
      inner.innerHTML = `<div class="chart-empty"><div class="chart-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="chart-empty-t">No data yet</div><div class="chart-empty-s">Open your projects in the viewer and traffic will appear here.</div></div>`;
      return;
    }

    const metricLabel = isVisitors ? 'visitors' : 'visits';
    const color = METRIC_COLOR[_metric];

    // ── Unified per-project bucket computation ────────────────────────────────
    const buckets = {};
    const sessionSeen = {};
    keys.forEach(k=>{
      buckets[k]={};
      sessionSeen[k]={};
      _projects.forEach(p=>{ buckets[k][p.id]=0; sessionSeen[k][p.id]=new Set(); });
    });

    av.forEach(v=>{
      const k = viewsToKey(v, useWeeks);
      if(!(k in buckets) || buckets[k][v.project_id]===undefined) return;
      if(isVisitors){
        if(v.session_id && !sessionSeen[k][v.project_id].has(v.session_id)){
          sessionSeen[k][v.project_id].add(v.session_id);
          buckets[k][v.project_id]++;
        }
      } else {
        buckets[k][v.project_id]++;
      }
    });

    const visibleProjects = _selectedPid==='all' ? _projects : _projects.filter(p=>p.id===_selectedPid);
    const showEvery = keys.length<=7?1:keys.length<=14?2:5;

    if(_mode === 'overall'){
      // ── Cumulative: one line per visible project ────────────────────────────
      const projectLines = visibleProjects.map(p=>{
        let run=0;
        const cumCounts = keys.map(k=>{ run+=(buckets[k][p.id]||0); return run; });
        return { project:p, counts:cumCounts, color:projectColor(p.id) };
      }).filter(pl=>pl.counts[pl.counts.length-1]>0);

      const grandTotal = projectLines.reduce((s,pl)=>s+pl.counts[pl.counts.length-1],0);
      metaEl.textContent = grandTotal ? fmt(grandTotal)+' total' : '';

      if(!projectLines.length){
        inner.innerHTML = `<div class="chart-empty"><div class="chart-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="chart-empty-t">No data yet</div><div class="chart-empty-s">Open your projects in the viewer and traffic will appear here.</div></div>`;
      } else if(projectLines.length===1){
        inner.innerHTML = buildLineGraph(projectLines[0].counts, labels, projectLines[0].color, metricLabel);
      } else {
        _chartZoneData={};
        inner.innerHTML = buildMultiLineGraph(projectLines, keys, labels, metricLabel);
      }

    } else {
      // ── Daily: stacked bars (multi) or single-color bars ───────────────────
      const stackedTotals = keys.map(k=>visibleProjects.reduce((s,p)=>s+(buckets[k][p.id]||0),0));
      const maxVal = Math.max(...stackedTotals,1);
      const periodTotal = stackedTotals.reduce((a,b)=>a+b,0);
      metaEl.textContent = periodTotal ? fmt(periodTotal)+' total' : '';

      if(visibleProjects.length>1 && _selectedPid==='all'){
        // Stacked bars
        const keyHtml = visibleProjects.map(p=>`<div class="color-key-item"><div class="color-key-dot" style="background:${projectColor(p.id)}"></div>${esc(p.name||'Untitled')}</div>`).join('');
        const bars = keys.map((k,i)=>{
          const total=stackedTotals[i];
          const segs=visibleProjects.filter(p=>(buckets[k][p.id]||0)>0).map(p=>{
            const h=total>0?Math.round((buckets[k][p.id]||0)/total*100):0;
            return `<div class="bar-seg" style="height:${h}%;background:${projectColor(p.id)}" data-tip-name="${esc(p.name||'Untitled')}" data-tip-val="${buckets[k][p.id]||0} ${metricLabel}"></div>`;
          }).join('');
          return `<div class="bar-stack" style="height:${total?Math.max(3,Math.round(total/maxVal*100))+'%':'4px'}">${segs||`<div style="height:4px;background:var(--s2);border-radius:3px;opacity:.3"></div>`}</div>`;
        });
        inner.innerHTML = `<div class="chart-area">
          <div class="bar-chart">${bars.join('')}</div>
          <div class="bar-labels">${keys.map((k,i)=>`<div class="bar-label">${i%showEvery===0||i===keys.length-1?labels[i]:''}</div>`).join('')}</div>
          <div class="color-key">${keyHtml}</div>
        </div>`;
      } else {
        // Single-color bars
        const p0 = visibleProjects[0];
        const counts = keys.map(k=>p0?buckets[k][p0.id]||0:0);
        const barColor = p0 ? projectColor(p0.id) : color;
        inner.innerHTML = `<div class="chart-area">
          <div class="bar-chart">${counts.map((c,i)=>`<div class="bar" style="height:${Math.max(c?3:0,Math.round(c/maxVal*100))}%;background:${barColor};opacity:${c?1:0.12}" data-tip-name="${esc(labels[i])}" data-tip-val="${c} ${metricLabel}"></div>`).join('')}</div>
          <div class="bar-labels">${keys.map((k,i)=>`<div class="bar-label">${i%showEvery===0||i===keys.length-1?labels[i]:''}</div>`).join('')}</div>
        </div>`;
      }
    }
    attachChartTooltips();
  }

  function renderDetail(){
    const el = document.getElementById('detailSection');
    if(_metric==='revenue'){ el.innerHTML=''; return; }

    const av = activeViews();
    const isVisitors = _metric==='visitors';
    const color = METRIC_COLOR[_metric];

    // Per-site breakdown
    const byProjViews   = {};
    const byProjSession = {};
    av.forEach(v=>{
      byProjViews[v.project_id]=(byProjViews[v.project_id]||0)+1;
      if(!byProjSession[v.project_id]) byProjSession[v.project_id]=new Set();
      if(v.session_id) byProjSession[v.project_id].add(v.session_id);
    });

    const siteRows = _projects.map(p=>({
      id:p.id, name:p.name||'Untitled',
      views:byProjViews[p.id]||0,
      visitors:byProjSession[p.id]?.size||0,
    })).sort((a,b)=>b.views-a.views).slice(0,6);

    const leftTitle  = _metric==='sites'?'Sites by views':isVisitors?'Sites by visitors':'Sites by views';
    const leftValFn  = r => isVisitors ? (r.visitors?fmt(r.visitors):'—') : (r.views?fmt(r.views):'—');

    const siteHtml = siteRows.length
      ? siteRows.map(r=>`<div class="detail-row">
          <div class="detail-row-name"><div class="detail-dot" style="background:${r.views?projectColor(r.id):'var(--b2)'}"></div><span>${esc(r.name)}</span></div>
          <div class="detail-row-val">${leftValFn(r)}</div>
        </div>`).join('')
      : '<div class="detail-empty">No projects yet</div>';

    // Right: devices (visitors) or referrers (views/sites)
    let rightTitle, rightHtml;
    if(!isVisitors){
      rightTitle = 'Top referrers';
      const refCounts={};
      av.forEach(v=>{
        if(!v.referrer) return;
        let host=v.referrer;
        try{ host=new URL(v.referrer).hostname.replace(/^www\./,''); }catch{}
        refCounts[host]=(refCounts[host]||0)+1;
      });
      const refs=Object.entries(refCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
      const refMax=refs[0]?.[1]||1;
      rightHtml = refs.length
        ? refs.map(([h,c])=>`<div class="detail-bar-row"><div class="detail-bar-label">${esc(h)}</div><div class="detail-bar-track"><div class="detail-bar-fill" style="width:${Math.round(c/refMax*100)}%;background:${color}"></div></div><div class="detail-bar-pct">${fmt(c)}</div></div>`).join('')
        : '<div class="detail-empty">No referrer data yet</div>';
    } else {
      rightTitle = 'Devices';
      const dc={};
      av.forEach(v=>{ const d=v.device||'unknown'; dc[d]=(dc[d]||0)+1; });
      const tot=Object.values(dc).reduce((a,b)=>a+b,0);
      const dcMax=Object.values(dc).reduce((a,b)=>Math.max(a,b),1);
      rightHtml = tot
        ? Object.entries(dc).sort((a,b)=>b[1]-a[1]).map(([d,c])=>`<div class="detail-bar-row"><div class="detail-bar-label">${esc(d)}</div><div class="detail-bar-track"><div class="detail-bar-fill" style="width:${Math.round(c/dcMax*100)}%;background:${color}"></div></div><div class="detail-bar-pct">${Math.round(c/tot*100)}%</div></div>`).join('')
        : '<div class="detail-empty">No device data yet</div>';
    }

    el.innerHTML=`<div class="detail-grid">
      <div class="detail-card"><div class="detail-card-title">${leftTitle}</div>${siteHtml}</div>
      <div class="detail-card"><div class="detail-card-title">${rightTitle}</div>${rightHtml}</div>
    </div>`;
  }

  // ── SVG multi-line graph for cumulative all-projects mode ─────────────────
  function buildMultiLineGraph(projectLines, keys, labels, metricLabel){
    const n = keys.length;
    if(!n) return '';
    const W = 1000, H = 140, padT = 12;
    const allVals = projectLines.flatMap(pl=>pl.counts);
    const max = Math.max(...allVals, 1);

    let defsHtml='', areasHtml='', linesHtml='', circlesHtml='';
    projectLines.forEach(pl=>{
      const id = 'lg_'+pl.color.replace('#','')+'_'+pl.project.id.slice(-4);
      const pts = pl.counts.map((c,i)=>({
        x: n>1?(i/(n-1))*W:W/2,
        y: padT+(1-c/max)*(H-padT),
        c
      }));
      const path = pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
      const area = `${path} L${pts[n-1].x.toFixed(1)} ${H} L${pts[0].x.toFixed(1)} ${H} Z`;
      const r = n>60?2:3.5;
      defsHtml  += `<linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${pl.color}" stop-opacity="0.14"/><stop offset="100%" stop-color="${pl.color}" stop-opacity="0.01"/></linearGradient>`;
      areasHtml += `<path d="${area}" fill="url(#${id})"/>`;
      linesHtml += `<path d="${path}" fill="none" stroke="${pl.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
      circlesHtml += pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r}" fill="${pl.color}" stroke="var(--s1)" stroke-width="1.5"/>`).join('');
    });

    // Vertical hover zones — one per day, show all projects' values
    const zoneW = n>1?W/(n-1):W;
    const zonesHtml = keys.map((k,i)=>{
      const x = n>1?(i/(n-1))*W:W/2;
      _chartZoneData[i] = {
        label: labels[i],
        stats: projectLines.map(pl=>({ name:pl.project.name||'Untitled', color:pl.color, count:pl.counts[i] })).filter(s=>s.count>0)
      };
      return `<rect x="${Math.max(0,x-zoneW/2).toFixed(1)}" y="0" width="${zoneW.toFixed(1)}" height="${H}" fill="transparent" class="chart-hover-zone" data-idx="${i}" style="cursor:default"/>`;
    }).join('');

    const showEvery = n<=7?1:n<=14?2:5;
    const labelHtml = labels.map((l,i)=>`<div class="bar-label">${i%showEvery===0||i===n-1?l:''}</div>`).join('');

    return `<div class="chart-area">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:140px;overflow:visible" preserveAspectRatio="none">
        <defs>${defsHtml}</defs>
        ${areasHtml}${linesHtml}${circlesHtml}${zonesHtml}
      </svg>
      <div class="bar-labels">${labelHtml}</div>
    </div>`;
  }

  // ── chart tooltip ─────────────────────────────────────────────────────────────
  function posTip(e, tip){
    const x = e.clientX+14, y = e.clientY-52;
    tip.style.left = (x+tip.offsetWidth>window.innerWidth ? e.clientX-tip.offsetWidth-14 : x)+'px';
    tip.style.top  = (y<8 ? e.clientY+14 : y)+'px';
  }

  function attachChartTooltips(){
    const tip    = document.getElementById('chartTip');
    const nameEl = document.getElementById('chartTipName');
    const valEl  = document.getElementById('chartTipVal');
    if(!tip) return;

    // Single-value: bars and single-line dots
    document.querySelectorAll('[data-tip-name]').forEach(el=>{
      el.addEventListener('mouseenter', ()=>{
        nameEl.textContent = el.dataset.tipName;
        valEl.innerHTML = `<span style="color:var(--sub)">${esc(el.dataset.tipVal)}</span>`;
        tip.style.display = 'block';
      });
      el.addEventListener('mousemove', e=>posTip(e,tip));
      el.addEventListener('mouseleave', ()=>{ tip.style.display='none'; });
    });

    // Multi-value: vertical hover zones on multi-line chart
    document.querySelectorAll('.chart-hover-zone').forEach(el=>{
      const data = _chartZoneData[parseInt(el.dataset.idx)];
      if(!data) return;
      el.addEventListener('mouseenter', ()=>{
        nameEl.textContent = data.label;
        valEl.innerHTML = data.stats.map(s=>
          `<div style="display:flex;align-items:center;gap:7px;margin-top:5px">
            <div style="width:7px;height:7px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
            <span style="color:rgba(255,255,255,.85);font-size:11px;font-weight:600">${esc(s.name)}</span>
            <span style="color:var(--sub);font-size:11px;font-weight:700;margin-left:auto;padding-left:12px">${s.count}</span>
          </div>`
        ).join('');
        tip.style.display = 'block';
      });
      el.addEventListener('mousemove', e=>posTip(e,tip));
      el.addEventListener('mouseleave', ()=>{ tip.style.display='none'; });
    });
  }

  // ── load everything via edge function (bypasses all RLS/auth issues) ────────
  let _session = null;

  async function loadData(){
    const since = new Date(Date.now()-_days*86400000).toISOString();
    try{
      const res = await fetch('https://ciuqhxrxcznmgorjeumz.supabase.co/functions/v1/analytics', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${_session.access_token}`
        },
        body: JSON.stringify({ since_ts: since })
      });
      const payload = await res.json();
      _projects = payload.projects || [];
      _views    = payload.views    || [];
    }catch(e){ _projects=[]; _views=[]; }

    // Rebuild dropdown from fresh project list (public projects only)
    const menu = document.getElementById('projDdMenu');
    // remove old project options, keep "All projects"
    menu.querySelectorAll('.proj-dd-opt:not([data-id="all"])').forEach(o=>o.remove());
    const publicProjects = _projects.filter(p=>p.is_public);
    publicProjects.forEach((p,i)=>{
      const opt=document.createElement('div');
      opt.className='proj-dd-opt';
      opt.dataset.id=p.id;
      opt.onclick=()=>selectProject(p.id);
      opt.innerHTML=`<div class="proj-dd-dot" style="background:${PALETTE[i%PALETTE.length]}"></div>${esc(p.name||'Untitled')}`;
      menu.appendChild(opt);
    });
    // if selected project no longer exists, reset to all
    if(_selectedPid!=='all' && !_projects.find(p=>p.id===_selectedPid)) _selectedPid='all';

    render();
    const total  = _views.length;
    const unique = new Set(_views.map(v=>v.session_id).filter(Boolean)).size;
    document.getElementById('pageSub').textContent = total
      ? `${fmt(total)} page views · ${fmt(unique)} unique visitors`
      : 'No traffic yet — open your projects in the viewer to see data here.';
  }

  // ── init ───────────────────────────────────────────────────────────────────
  (async()=>{
    const {data:{session}} = await sb.auth.getSession();
    if(!session){ window.location.href='index.html'; return; }
    _session = session;
    const u=session.user;
    const initials=(u.user_metadata?.display_name||u.email||'?').trim().slice(0,1).toUpperCase();
    const pfp=document.getElementById('tbPfp');
    if(pfp) pfp.textContent=initials;

    // Read metric from URL params before first render
    const params=new URLSearchParams(location.search);
    const urlMetric=params.get('metric');
    if(urlMetric && ['visitors','views','sites','revenue'].includes(urlMetric)){
      _metric=urlMetric;
      document.querySelectorAll('.stat-card').forEach(c=>c.classList.toggle('active',c.dataset.metric===_metric));
    }

    await loadData();
  })();

</script>
