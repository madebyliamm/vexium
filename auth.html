<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Vexium — Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#020208;--s1:#06060f;--s2:#0a0a16;--b1:#13131e;--b2:#1c1c2e;--b3:#26263a;--a1:#4f6ef7;--a2:#9b79fc;--a3:#06d6a0;--text:#f2f2ff;--sub:#7070a0;--err:#ef4444;--sans:'Plus Jakarta Sans',sans-serif;--display:'Syne',sans-serif;}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(79,110,247,.07),transparent);pointer-events:none}
    .logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:32px}
    .logo img{width:28px;height:28px;border-radius:7px}
    .logo-t{font-family:var(--display);font-size:20px;font-weight:800;color:var(--text)}
    .g{background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .card{background:var(--s1);border:1px solid var(--b2);border-radius:20px;padding:36px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.5)}
    .tabs{display:flex;gap:4px;background:var(--b1);border-radius:11px;padding:4px;margin-bottom:28px}
    .tab{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;border:none;color:var(--sub);font-family:var(--sans);transition:all .15s;text-align:center}
    .tab.on{background:var(--b2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:10px;font-weight:700;color:var(--sub);margin-bottom:7px;letter-spacing:.8px;text-transform:uppercase}
    .field input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;font-family:var(--sans);transition:all .15s}
    .field input:focus{border-color:rgba(79,110,247,.5);background:var(--b1);box-shadow:0 0 0 3px rgba(79,110,247,.08)}
    .field input::placeholder{color:var(--sub)}
    .hint{font-size:11px;color:var(--sub);margin-top:5px}
    .submit{width:100%;padding:13px;border-radius:11px;font-size:14px;font-weight:700;color:#fff;border:none;cursor:pointer;font-family:var(--sans);background:linear-gradient(135deg,var(--a1),var(--a2));box-shadow:0 0 24px rgba(79,110,247,.25);transition:all .2s;margin-top:6px}
    .submit:hover{transform:translateY(-1px);box-shadow:0 0 36px rgba(79,110,247,.4)}
    .submit:disabled{opacity:.5;transform:none;cursor:not-allowed}
    .msg{border-radius:9px;padding:11px 14px;font-size:13px;margin-bottom:16px;display:none}
    .msg.show{display:block}
    .msg.err{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
    .msg.ok{background:rgba(6,214,160,.07);border:1px solid rgba(6,214,160,.2);color:#5eead4}
    .back{text-align:center;margin-top:20px;font-size:12px;color:var(--sub)}
    .back a{color:var(--sub);text-decoration:none}
    .back a:hover{color:var(--text)}
  </style>
</head>
<body>
<a href="index.html" class="logo">
  <img src="vexium_logo.png" alt="V"/>
  <span class="logo-t">VEXIUM<span class="g">.AI</span></span>
</a>
<div class="card">
  <div class="tabs">
    <button class="tab on" id="tsi" onclick="sw('signin')">Sign in</button>
    <button class="tab" id="tsu" onclick="sw('signup')">Create account</button>
  </div>
  <div id="msgEl" class="msg"></div>
  <div id="siForm">
    <div class="field"><label>Username</label><input type="text" id="siU" placeholder="your_username" autocomplete="username" autocapitalize="none" spellcheck="false"/></div>
    <div class="field"><label>Password</label><input type="password" id="siP" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="submit" id="siBtn" onclick="signIn()">Sign in →</button>
  </div>
  <div id="suForm" style="display:none">
    <div class="field">
      <label>Username</label>
      <input type="text" id="suU" placeholder="coolbuilder" autocomplete="username" autocapitalize="none" spellcheck="false" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')"/>
      <div class="hint">Letters, numbers, underscores. No spaces.</div>
    </div>
    <div class="field"><label>Password</label><input type="password" id="suP" placeholder="At least 6 characters" autocomplete="new-password"/></div>
    <button class="submit" id="suBtn" onclick="signUp()">Create account →</button>
  </div>
</div>
<div class="back"><a href="index.html">← Back to Vexium</a></div>
<script>
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const params = new URLSearchParams(location.search);
  if (params.get('tab') === 'signup') sw('signup');

  function sw(t) {
    document.getElementById('tsi').classList.toggle('on', t==='signin');
    document.getElementById('tsu').classList.toggle('on', t==='signup');
    document.getElementById('siForm').style.display = t==='signin' ? '' : 'none';
    document.getElementById('suForm').style.display = t==='signup' ? '' : 'none';
    hide();
    setTimeout(() => document.getElementById(t==='signin'?'siU':'suU').focus(), 40);
  }
  function msg(text, type) {
    const el = document.getElementById('msgEl');
    el.textContent = text; el.className = 'msg show ' + type;
  }
  function hide() { document.getElementById('msgEl').className = 'msg'; }

  async function signIn() {
    const u = document.getElementById('siU').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
    const p = document.getElementById('siP').value;
    if (!u) { msg('Enter your username.','err'); return; }
    if (!p) { msg('Enter your password.','err'); return; }
    const btn = document.getElementById('siBtn');
    btn.disabled=true; btn.textContent='Signing in…'; hide();
    const { error } = await sb.auth.signInWithPassword({ email: toEmail(u), password: p });
    if (error) {
      btn.disabled=false; btn.textContent='Sign in →';
      msg(error.message.includes('Invalid')||error.message.includes('credentials') ? 'Wrong username or password.' : error.message,'err');
    } else { location.href='home.html'; }
  }

  async function signUp() {
    const u = document.getElementById('suU').value.trim();
    const p = document.getElementById('suP').value;
    if (!u || u.length < 3) { msg('Username must be at least 3 characters.','err'); return; }
    if (!p || p.length < 6) { msg('Password must be at least 6 characters.','err'); return; }
    const btn = document.getElementById('suBtn');
    btn.disabled=true; btn.textContent='Creating…'; hide();
    const { data: ex } = await sb.from('profiles').select('id').eq('username',u).maybeSingle();
    if (ex) { btn.disabled=false; btn.textContent='Create account →'; msg('That username is taken — try another.','err'); return; }
    const { data, error } = await sb.auth.signUp({ email: toEmail(u), password: p, options:{ data:{username:u} } });
    if (error) { btn.disabled=false; btn.textContent='Create account →'; msg(error.message,'err'); return; }
    if (data.session) {
      await sb.from('profiles').upsert({id:data.user.id,username:u},{onConflict:'id'});
      location.href='home.html';
    } else {
      msg('Check your email to confirm, then sign in.','ok');
      btn.disabled=false; btn.textContent='Create account →';
      sw('signin');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key==='Enter') {
      if (document.getElementById('siForm').style.display!=='none') signIn();
      else signUp();
    }
  });
  sb.auth.getSession().then(({data}) => { if (data.session) location.href='home.html'; });
</script>
</body>
</html>
