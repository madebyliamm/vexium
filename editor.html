<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Editor — Vexium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    a{color:inherit;text-decoration:none}
    a:visited{color:inherit}
    :root{
      --bg:#020209;--s1:#04040e;--s2:#07071a;--b1:#0e0e22;--b2:#16162a;--b3:#20203a;
      --a1:#4f6ef7;--a2:#9b79fc;--text:#f0f0ff;--sub:#5555a0;--err:#ef4444;--warn:#f59e0b;--ok:#22c55e;
      --sans:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono','Fira Code',monospace;
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
    ::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--b3)}

    /* ── TOPBAR ── */
    #topbar{
      height:44px;background:var(--s1);border-bottom:1px solid var(--b1);
      display:flex;align-items:center;padding:0 clamp(8px,1.5vw,14px);gap:clamp(6px,1vw,10px);
      flex-shrink:0;z-index:50;position:relative;
    }
    .tb-logo{color:var(--text);display:flex;align-items:center;gap:7px;text-decoration:none}
    .tb-logo img{width:18px;height:18px;border-radius:4px}
    .tb-logo-t{color:var(--text);font-family:var(--sans);font-size:13px;font-weight:800;color:var(--text)}
    .tb-logo-t span{background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .tb-sep{width:1px;height:16px;background:var(--b2)}
    .tb-proj{font-size:12px;color:var(--sub);font-weight:700;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tb-saving{font-family:var(--mono);font-size:10px;color:var(--sub);display:none}
    .tb-saving.show{display:block}

    /* mode tabs */
    .tb-modes{display:flex;gap:2px;background:var(--b1);border-radius:6px;padding:3px;margin:0 auto;flex-shrink:0}
    .tb-mode{padding:3px 14px;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;border:none;color:var(--sub);font-family:var(--sans);transition:all .15s}
    .tb-mode.on{background:var(--b2);color:var(--text)}

    .tb-r{display:flex;align-items:center;gap:5px}
    .tb-btn{background:transparent;border:1px solid transparent;color:var(--sub);padding:4px 11px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap}
    .tb-btn:hover{background:var(--b2);border-color:var(--b2);color:var(--text)}
    .tb-btn.active{background:rgba(79,110,247,.1);border-color:rgba(79,110,247,.2);color:#93c5fd}
    .tb-btn.primary{background:var(--a1);border-color:transparent;color:#fff}
    .tb-btn.primary:hover{background:#3d5df0}
    .tb-pfp-lnk{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;text-decoration:none;flex-shrink:0;margin-left:2px}

    /* ── PROJECT SETTINGS MODAL (redesigned) ── */
    .ep-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:16px}
    .ep-overlay.show{display:flex}

    .ep-modal{
      background:var(--s1);
      border:1px solid var(--b2);
      border-radius:20px;
      width:420px;max-width:100%;
      max-height:88vh;overflow-y:auto;
      box-shadow:0 40px 100px rgba(0,0,0,.9);
      display:flex;flex-direction:column;
    }

    /* header */
    .ep-header{
      padding:20px 22px 0;
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
    }
    .ep-header-title{font-size:15px;font-weight:800;letter-spacing:-.3px}
    .ep-close{width:28px;height:28px;border-radius:8px;background:var(--b2);border:none;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
    .ep-close:hover{background:var(--b3);color:var(--text)}

    /* body */
    .ep-body{padding:18px 22px 22px;display:flex;flex-direction:column;gap:20px}

    /* section label */
    .ep-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--sub);margin-bottom:8px}

    /* name field */
    .ep-name-row{display:flex;align-items:center;gap:12px}
    .ep-emoji-big{
      width:48px;height:48px;border-radius:12px;
      background:var(--b1);border:1px solid var(--b2);
      display:flex;align-items:center;justify-content:center;
      font-size:24px;flex-shrink:0;cursor:pointer;transition:all .15s;
    }
    .ep-emoji-big:hover{border-color:rgba(79,110,247,.4);background:rgba(79,110,247,.06)}
    .ep-name-input{
      flex:1;background:var(--b1);border:1px solid var(--b2);border-radius:10px;
      padding:11px 14px;color:var(--text);font-size:14px;font-weight:700;
      outline:none;font-family:var(--sans);transition:border-color .15s;
    }
    .ep-name-input:focus{border-color:rgba(79,110,247,.5)}
    .ep-name-input::placeholder{color:var(--sub)}

    /* emoji picker strip */
    .ep-emoji-strip{display:flex;gap:5px;flex-wrap:wrap}
    .ep-emoji-opt{
      font-size:20px;width:34px;height:34px;
      display:flex;align-items:center;justify-content:center;
      border-radius:8px;cursor:pointer;border:2px solid transparent;
      transition:all .12s;user-select:none;flex-shrink:0;
    }
    .ep-emoji-opt:hover{background:var(--b2)}
    .ep-emoji-opt.sel{background:rgba(79,110,247,.12);border-color:rgba(79,110,247,.4)}

    /* divider */
    .ep-div{height:1px;background:var(--b2);margin:0 -22px}

    /* visibility toggle */
    .ep-vis-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .ep-vis-info{}
    .ep-vis-label{font-size:13px;font-weight:700}
    .ep-vis-sub{font-size:11px;color:var(--sub);margin-top:2px}
    .ep-lock-btn{
      display:flex;align-items:center;gap:7px;
      padding:8px 14px;border-radius:9px;
      background:var(--b2);border:none;cursor:pointer;
      font-family:var(--sans);font-size:11px;font-weight:700;
      color:var(--sub);transition:all .15s;flex-shrink:0;
    }
    .ep-lock-btn:hover{background:var(--b3);color:var(--text)}
    .ep-lock-btn.unlocked{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.15);color:#4ade80}
    .ep-lock-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

    /* collaborators */
    .ep-collab-list{display:flex;flex-direction:column;gap:6px}
    .ep-collab-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--b1);border:1px solid var(--b2);border-radius:9px}
    .ep-collab-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
    .ep-collab-info{flex:1;min-width:0}
    .ep-collab-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ep-collab-handle{font-size:10px;color:var(--sub)}
    .ep-collab-role{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(79,110,247,.1);color:#818cf8;flex-shrink:0}
    .ep-collab-rm{width:22px;height:22px;border-radius:5px;background:transparent;border:none;color:var(--sub);cursor:pointer;font-size:13px;transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .ep-collab-rm:hover{background:rgba(239,68,68,.1);color:#ef4444}
    .ep-collab-none{font-size:11px;color:var(--sub);padding:2px 0}

    /* footer */
    .ep-footer{padding:0 22px 18px;display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
    .ep-btn{padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--sans);transition:all .15s}
    .ep-cancel{background:var(--b2);color:var(--sub)}
    .ep-cancel:hover{background:var(--b3);color:var(--text)}
    .ep-save{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff}
    .ep-save:hover{opacity:.9}

    /* ── LAYOUT ── */
    #workspace{display:flex;height:calc(100vh - 44px - 22px)}

    /* ── SIDEBAR ── */
    #sidebar{
      width:200px;min-width:120px;max-width:300px;
      background:var(--s1);border-right:1px solid var(--b1);
      display:flex;flex-direction:column;flex-shrink:0;
    }
    .sb-head{padding:8px 10px 8px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
    .sb-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--sub)}
    .sb-add{width:24px;height:24px;background:transparent;border:none;color:var(--sub);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:300;transition:all .15s;line-height:1;position:relative}
    .sb-add:hover{background:var(--b2);color:var(--text)}
    .add-dd{display:none;position:absolute;top:30px;right:0;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:4px;min-width:140px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.7)}
    .add-dd.show{display:block}
    #fileTree{flex:1;overflow-y:auto;padding:4px 0}
    .tree-item{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 12px;font-size:11px;cursor:pointer;transition:background .1s;position:relative;font-family:var(--mono);color:var(--sub)}
    .tree-item:hover{background:var(--b1);color:var(--text)}
    .tree-item.active{background:rgba(79,110,247,.07);color:var(--text)}
    .tree-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--a1);border-radius:0 1px 1px 0}
    .tree-ico{width:13px;flex-shrink:0}
    .tree-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tree-main-dot{width:4px;height:4px;border-radius:50%;background:var(--a1);flex-shrink:0;opacity:.8}
    .tree-ctx{opacity:0;background:transparent;border:none;color:var(--sub);width:18px;height:18px;border-radius:3px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .tree-item:hover .tree-ctx{opacity:1}
    .tree-ctx:hover{background:var(--b3);color:var(--text)}

    /* ── CTX MENU ── */
    .ctx-menu{position:fixed;background:var(--s2);border:1px solid var(--b2);border-radius:9px;padding:4px;min-width:148px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none}
    .ctx-menu.show{display:block}
    .ctx-item{padding:7px 12px;font-size:11px;cursor:pointer;border-radius:5px;display:flex;align-items:center;gap:8px;color:var(--text);transition:background .1s}
    .ctx-item:hover{background:var(--b2)}
    .ctx-item.danger{color:var(--err)}
    .ctx-item.danger:hover{background:rgba(239,68,68,.1)}
    .ctx-ico{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;opacity:.6}

    /* ── MAIN ── */
    #mainPanel{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
    #editorArea{flex:1;display:flex;min-height:0;overflow:hidden}

    /* ── EDITOR PANE ── */
    .editor-pane{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
    .pane-tabs{height:34px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:flex-end;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
    .pane-tabs::-webkit-scrollbar{display:none}
    .pane-tab{display:flex;align-items:center;gap:6px;padding:0 12px;height:32px;font-size:11px;font-family:var(--mono);cursor:pointer;border-right:1px solid var(--b1);border-top:2px solid transparent;white-space:nowrap;color:var(--sub);flex-shrink:0;transition:all .1s}
    .pane-tab:hover{color:var(--text);background:rgba(255,255,255,.01)}
    .pane-tab.active{color:var(--text);border-top-color:var(--a1);background:rgba(79,110,247,.04)}
    .pane-tab .tab-dot{width:4px;height:4px;border-radius:50%;background:var(--a2);display:none}
    .pane-tab.dirty .tab-dot{display:block}
    .pane-tab.dirty .tab-close{display:none}
    .pane-tab .tab-close{opacity:.25;font-size:13px;line-height:1;background:none;border:none;color:inherit;cursor:pointer;padding:0;margin-left:2px}
    .pane-tab:hover .tab-close{opacity:.6}
    .pane-tab .tab-close:hover{opacity:1;color:var(--err)}
    .monaco-wrap{flex:1;overflow:hidden}

    /* ── SPLIT MODE (AI + editor side by side) ── */
    #editorArea.split #aiPanel.show{flex:1;min-width:0}
    #editorArea.split .editor-pane{flex:1;min-width:0;border-left:1px solid var(--b1)}
    /* In split mode, preview/console stack vertically inside the right panel */
    #editorArea.split #rightPanel{flex-direction:column}

    /* ── AI PANEL ── */
    #aiPanel{flex:1;display:none;flex-direction:column;background:var(--bg);min-width:0;overflow:hidden;position:relative}
    #aiPanel.show{display:flex}

    /* ── EMPTY STATE ── */
    #aiCenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:24px;pointer-events:none;transition:opacity .2s,transform .2s}
    #aiCenter.hidden{opacity:0;pointer-events:none;transform:translateY(-8px)}
    .ai-star{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 0 32px rgba(79,110,247,.4);pointer-events:none}
    .ai-star svg{width:26px;height:26px;fill:#fff}
    .ai-center-h{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.4px;margin-bottom:22px}
    #aiCenterInput{width:min(92%,580px);pointer-events:all}
    #aiCenterInput #aiInputArea{border-radius:16px;border:1px solid var(--b2);background:var(--s1);padding:13px 13px 13px 18px;transition:border-color .15s}
    #aiCenterInput #aiInputArea:focus-within{border-color:rgba(79,110,247,.5);box-shadow:0 0 0 3px rgba(79,110,247,.06)}
    #aiTemplates{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:14px;pointer-events:all;width:min(92%,600px)}
    .ai-tpl{background:var(--s1);border:1px solid var(--b2);border-radius:20px;padding:6px 13px;font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--sans);display:flex;align-items:center;gap:5px}
    .ai-tpl:hover{background:var(--b2);color:var(--text);border-color:var(--b3);transform:translateY(-1px)}
    .ai-tpl-ico{font-size:12px}

    /* shared input box */
    #aiInputArea{display:flex;align-items:flex-end;gap:10px}
    #aiInput{flex:1;background:transparent;border:none;font-size:14px;color:var(--text);font-family:var(--sans);resize:none;outline:none;line-height:1.55;overflow:hidden;min-height:22px;max-height:25vh}
    #aiInput::placeholder{color:var(--sub)}
    /* Center state send — bigger */
    #aiSend{width:38px;height:38px;min-width:38px;min-height:38px;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .15s;box-shadow:0 0 20px rgba(79,110,247,.45);align-self:flex-end}
    #aiSend:hover{opacity:.88;transform:scale(1.06)}
    #aiSend:disabled{opacity:.25;cursor:default;transform:none}
    #aiSend svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

    /* ── CHAT AREA ── */
    #aiChatWrap{flex:1;overflow:hidden;display:none;flex-direction:column;min-height:0;--chat-w:min(680px,90%)}
    #aiChatWrap.show{display:flex}

    #aiMessages{flex:1;overflow-y:auto;padding:24px 0 8px;display:flex;flex-direction:column;align-items:center;gap:0;scroll-behavior:smooth}
    #aiMessages::-webkit-scrollbar{width:3px}
    #aiMessages::-webkit-scrollbar-track{background:transparent}
    #aiMessages::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

    /* message rows — constrained to chat-w, full stretch */
    .ai-row{display:flex;flex-direction:column;padding:2px 0;position:relative;width:var(--chat-w)}

    /* user messages — right-aligned bubble */
    .ai-row.user{align-items:flex-end;padding:5px 0}
    .ai-row.user .ai-bubble{
      background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;
      padding:10px 15px;border-radius:18px;border-bottom-right-radius:5px;
      font-size:13.5px;line-height:1.6;max-width:78%;word-break:break-word;
      position:relative;
    }
    /* bubble collapse */
    .ai-bubble.collapsed{max-height:120px;overflow:hidden}
    .ai-bubble.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:44px;background:linear-gradient(transparent,rgba(79,110,247,.9));border-radius:0 0 18px 5px;pointer-events:none}
    .ai-bubble-more{margin-top:4px;font-size:11px;font-weight:700;color:var(--sub);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:0;transition:color .12s}
    .ai-bubble-more:hover{color:var(--text)}

    /* ai messages — plain text flush left */
    .ai-row.ai{align-items:flex-start;padding:8px 0}
    .ai-row.ai .ai-text{
      font-size:13.5px;line-height:1.78;color:var(--text);
      word-break:break-word;width:100%;
    }
    .ai-row.ai .ai-text p{margin:0 0 10px}
    .ai-row.ai .ai-text p:last-child{margin:0}

    /* timestamp + actions — only on hover */
    .ai-msg-meta{display:flex;align-items:center;gap:6px;margin-top:4px;height:22px}
    .ai-row.user .ai-msg-meta{justify-content:flex-end}
    .ai-msg-time{font-size:10px;color:var(--sub);opacity:0;transition:opacity .12s;user-select:none}
    .ai-msg-actions{display:flex;align-items:center;gap:2px;opacity:0;transition:opacity .12s}
    .ai-row:hover .ai-msg-time,.ai-row:hover .ai-msg-actions{opacity:1}
    .ai-act-btn{width:24px;height:24px;border-radius:6px;background:transparent;border:none;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:var(--sans)}
    .ai-act-btn:hover{background:var(--b2);color:var(--text)}
    .ai-act-btn svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .ai-act-btn.copied{color:#4ade80}

    /* file cards — colored by language */
    .ai-file-cards{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
    .ai-file-card{
      display:inline-flex;align-items:center;gap:6px;
      padding:5px 10px;border-radius:7px;
      border:1px solid var(--b2);background:var(--s1);
      cursor:pointer;transition:all .13s;
      font-size:11px;font-weight:600;font-family:var(--mono);
      color:var(--sub);
    }
    .ai-file-card:hover{background:var(--b2);transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.3)}
    .ai-file-card-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

    /* typing indicator */
    .ai-typing{display:flex;align-items:center;gap:5px;padding:14px 0;width:var(--chat-w);margin:0 auto}
    .ai-typing span{width:5px;height:5px;border-radius:50%;background:var(--sub);animation:aiDot 1.3s infinite}
    .ai-typing span:nth-child(2){animation-delay:.18s}
    .ai-typing span:nth-child(3){animation-delay:.36s}
    @keyframes aiDot{0%,80%,100%{transform:scale(.8);opacity:.3}40%{transform:scale(1.2);opacity:1}}

    /* ── BOTTOM INPUT — floating, no bg box ── */
    #aiBottom{padding:10px 0 18px;flex-shrink:0;background:transparent;display:none;justify-content:center}
    #aiBottom.show{display:flex}
    #aiBottomWrap{width:var(--chat-w,min(680px,90%))}
    #aiBottomInputArea{
      border-radius:16px;border:1px solid var(--b2);background:var(--s1);
      padding:12px 12px 12px 18px;display:flex;align-items:flex-end;gap:10px;
      transition:border-color .15s,box-shadow .15s;
      box-shadow:0 4px 24px rgba(0,0,0,.25);
    }
    #aiBottomInputArea:focus-within{border-color:rgba(79,110,247,.5);box-shadow:0 0 0 3px rgba(79,110,247,.08),0 4px 24px rgba(0,0,0,.25)}
    #aiBottomInput{flex:1;background:transparent;border:none;font-size:14px;color:var(--text);font-family:var(--sans);resize:none;outline:none;line-height:1.55;overflow:hidden;min-height:22px;max-height:25vh}
    #aiBottomInput::placeholder{color:var(--sub)}
    #aiBottomSend{width:32px;height:32px;min-width:32px;min-height:32px;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .15s;box-shadow:0 0 16px rgba(79,110,247,.4);align-self:flex-end}
    #aiBottomSend:hover{opacity:.88;transform:scale(1.06)}
    #aiBottomSend:disabled{opacity:.25;cursor:default;transform:none}
    #aiBottomSend svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
    #rightResizer{width:4px;background:transparent;cursor:col-resize;flex-shrink:0;transition:background .15s}
    #rightResizer:hover,#rightResizer.dragging{background:var(--a1)}

    /* ── RIGHT PANEL ── */
    #rightPanel{width:46%;min-width:180px;max-width:75%;display:flex;flex-direction:column;border-left:1px solid var(--b1)}
    #rightPanel.hidden{display:none}

    /* ── PREVIEW TOOLBAR ── */
    #previewToolbar{
      height:38px;background:var(--s2);border-bottom:1px solid var(--b1);
      display:flex;align-items:center;gap:5px;padding:0 8px;flex-shrink:0;
    }
    .prev-nav{width:26px;height:26px;background:transparent;border:1px solid var(--b2);border-radius:5px;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
    .prev-nav:hover:not(:disabled){background:var(--b2);color:var(--text)}
    .prev-nav:disabled{opacity:.25;cursor:default}
    .prev-url{flex:1;background:var(--bg);border:1px solid var(--b2);border-radius:6px;padding:4px 10px;font-size:10px;color:var(--sub);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .prev-refresh{width:26px;height:26px;background:transparent;border:1px solid var(--b2);border-radius:5px;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
    .prev-refresh:hover{background:var(--b2);color:var(--text)}
    .prev-open{padding:4px 10px;background:transparent;border:1px solid var(--b2);border-radius:5px;font-size:10px;font-weight:700;color:var(--sub);cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap;flex-shrink:0}
    .prev-open:hover{background:var(--b2);color:var(--text)}

    #previewFrame{flex:1;width:100%;border:none;background:#fff;display:block}

    /* ── CONSOLE RESIZER ── */
    #consoleResizer{height:4px;background:transparent;cursor:row-resize}
    #consoleResizer:hover{background:var(--a1)}

    /* ── CONSOLE ── */
    #consolePanel{height:170px;min-height:50px;max-height:50%;background:var(--bg);border-top:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0}
    #consolePanel.hidden{display:none}
    #consoleHeader{height:28px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0}
    .con-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sub)}
    .con-badge{font-size:9px;border-radius:3px;padding:1px 5px;display:none}
    .con-badge.show{display:block}
    .con-err-bg{background:rgba(239,68,68,.15);color:var(--err)}
    .con-warn-bg{background:rgba(245,158,11,.15);color:var(--warn)}
    #consoleClear{margin-left:auto;width:20px;height:20px;background:transparent;border:none;color:var(--sub);border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    #consoleClear:hover{background:var(--b2);color:var(--text)}
    #consoleBody{flex:1;overflow-y:auto;padding:2px 0;font-family:var(--mono);font-size:11px}
    .con-line{padding:3px 14px;display:flex;align-items:baseline;gap:10px;border-bottom:1px solid rgba(255,255,255,.015)}
    .con-line.log{color:var(--text)}
    .con-line.warn{color:var(--warn);background:rgba(245,158,11,.04);border-left:2px solid var(--warn)}
    .con-line.error{color:var(--err);background:rgba(239,68,68,.04);border-left:2px solid var(--err)}
    .con-line.info{color:#93c5fd}
    .con-badge-inline{font-size:9px;opacity:.4;flex-shrink:0;white-space:nowrap}
    .con-msg{flex:1;word-break:break-all;white-space:pre-wrap}
    .con-empty{padding:16px;text-align:center;color:var(--sub);font-size:10px}

    /* ── STATUS BAR ── */
    #statusbar{height:22px;background:#01010a;border-top:1px solid var(--b1);display:flex;align-items:center;padding:0 14px;gap:18px;flex-shrink:0}
    #statusbar.hidden{display:none}
    .st{font-family:var(--mono);font-size:10px;color:var(--sub);display:flex;align-items:center;gap:4px}
    .st .acc{color:var(--a1)}
    .st-mode{margin-left:auto;font-size:9px;color:var(--b3);font-weight:700}

    /* ── MODALS ── */
    .overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center}
    .overlay.show{display:flex}
    .modal{background:var(--s1);border:1px solid var(--b2);border-radius:14px;padding:26px;width:340px;max-width:90vw;box-shadow:0 40px 80px rgba(0,0,0,.7)}
    .modal h3{font-family:var(--sans);font-size:16px;font-weight:800;margin-bottom:16px;letter-spacing:-.3px}
    .modal input{width:100%;background:var(--bg);border:1px solid var(--b2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;margin-bottom:14px;font-family:var(--mono);transition:border-color .15s}

    .modal-btns{display:flex;gap:8px;justify-content:flex-end}
    .mbtn{padding:7px 16px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--sans);transition:all .15s}
    .mbtn-cancel{background:var(--b2);color:var(--sub)}

    .mbtn-ok{background:var(--a1);color:#fff}

  </style>
</head>

<script>var require={paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs'}};</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script src="config.js" onerror="window._noConfig=true"></script>
<script>
  let sb = null;
  try {
    if (!window._noConfig && typeof supabase !== 'undefined' && typeof SUPABASE_URL !== 'undefined') {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch(e) {}

  let project = null, projectId = null;
  let fileSystem = {}, mainFile = 'index.html';
  let openTabs = [], activeFile = null;
  let previewVisible = false, consoleVisible = false;
  let editor = null, monacoReady = false;
  let dirtyFiles = new Set();
  let ctxTarget = null, fileModalCb = null;
  let prevHistory = [], prevHistIdx = -1;
  let errCnt = 0, warnCnt = 0;

  // Default code fingerprint — used to detect if there's real content
  const DEFAULT_HTML = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>My Project</title>
</head>
<body>

</body>
</html>`;

  function isDefaultCode(fs) {
    const files = Object.keys(fs || {});
    if (files.length === 0) return true;
    if (files.length === 1) {
      const content = (fs[files[0]] || '').trim();
      // Check against the default template
      const defaultTrimmed = DEFAULT_HTML.trim();
      // Also check for the per-project default (title varies) — strip title line
      const stripped = content.replace(/<title>[^<]*<\/title>/, '<title></title>').trim();
      const defaultStripped = defaultTrimmed.replace(/<title>[^<]*<\/title>/, '<title></title>').trim();
      if (stripped === defaultStripped) return true;
      // Empty body
      if (content.replace(/\s/g, '') === '<!DOCTYPEhtml><htmllang="en"><head><metacharset="UTF-8"/></head><body></body></html>') return true;
      // Truly empty
      if (!content) return true;
    }
    return false;
  }

  // ── INIT ──
  async function init() {
    projectId = localStorage.getItem('vexium_current_project');
    await loadProject();
    loadMonaco();
  }

  async function loadProject() {
    if (sb && projectId) {
      try {
        const { data: authData } = await sb.auth.getSession();
        const session = authData?.session;
        if (session) {
          const { data, error } = await sb.from('projects').select('*').eq('id', projectId).maybeSingle();
          if (data) {
            project = data;
            fileSystem = data.files || {};
            mainFile = data.main_file || 'index.html';
          }
        }
      } catch(e) {}
    }
    if (!project) {
      try {
        const list = JSON.parse(localStorage.getItem('vexium_projects') || '[]');
        project = list.find(p => p.id === projectId) || null;
        if (project) { fileSystem = project.files || {}; mainFile = project.main_file || 'index.html'; }
      } catch(e) {}
    }
    if (!project) {
      project = { id: projectId || 'local', name: 'Untitled', emoji: '💻', files: {}, main_file: 'index.html' };
      fileSystem = { 'index.html': DEFAULT_HTML };
      mainFile = 'index.html';
    }
    document.getElementById('tbProj').textContent = project.name || 'Untitled';
    document.title = (project.name || 'Untitled') + ' — Vexium';
    document.getElementById('stMode').textContent = sb ? 'Cloud' : 'Local';
    const uname = localStorage.getItem('vexium_username') || '?';
    document.getElementById('tbPfpLnk').textContent = uname.charAt(0).toUpperCase();

    // FIX 6: Only show preview by default if project has real content
    if (!isDefaultCode(fileSystem)) {

  // ── FILE TREE ──
  function renderFileTree() {
    const el = document.getElementById('fileTree');
    const files = Object.keys(fileSystem).sort((a, b) => {
      const o = f => f.endsWith('.html') ? 0 : f.endsWith('.css') ? 1 : f.endsWith('.js') ? 2 : 3;
      return o(a) - o(b) || a.localeCompare(b);
    });
    if (!files.length) { el.innerHTML = '<div style="padding:8px 12px;font-size:10px;color:var(--sub)">No files</div>'; return; }
    el.innerHTML = files.map(f => {
      const n = f.includes('/') ? f.split('/').pop() : f;
      const ext = n.split('.').pop();
      const col = ext === 'html' ? '#60a5fa' : ext === 'css' ? '#a78bfa' : ext === 'js' ? '#fbbf24' : '#5555a0';
      return `<div class="tree-item${f === activeFile ? ' active' : ''}" onclick="openFile('${esc(f)}')">
        <svg class="tree-ico" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="tree-name">${esc(n)}</span>
        ${f === mainFile ? '<div class="tree-main-dot" title="Main file"></div>' : ''}
        <button class="tree-ctx" onclick="openCtx(event,'${esc(f)}')">⋯</button>
      </div>`;
    }).join('');
  }

  // ── OPEN FILE ──
  function openFile(f) {
    if (!monacoReady) { setTimeout(() => openFile(f), 80); return; }
    if (!fileSystem.hasOwnProperty(f)) return;
    if (!openTabs.includes(f)) openTabs.push(f);
    activeFile = f;
    const lang = getLang(f);
    const model = monaco.editor.createModel(fileSystem[f] || '', lang);
    editor.setModel(model);
    editor.focus();
    model.onDidChangeContent(() => {
      if (activeFile !== f) return;
      fileSystem[f] = editor.getValue();
      dirtyFiles.add(f); markDirty(f, true);
      // Auto-refresh preview after typing stops for 600ms
      if (previewVisible) {
        clearTimeout(window._previewDebounce);
        window._previewDebounce = setTimeout(refreshPreview, 600);
      }
    });
    document.getElementById('stLang').textContent = lang.toUpperCase();
    renderTabs(); renderFileTree();
  }

  function getLang(f) {
    if (f.endsWith('.html')) return 'html';
    if (f.endsWith('.css')) return 'css';
    if (f.endsWith('.js')) return 'javascript';
    if (f.endsWith('.ts')) return 'typescript';
    if (f.endsWith('.json')) return 'json';
    if (f.endsWith('.md')) return 'markdown';
    return 'plaintext';
  }

  // ── TABS ──
  function renderTabs() {
    document.getElementById('paneTabs').innerHTML = openTabs.map(f => {
      const n = f.includes('/') ? f.split('/').pop() : f;
      return `<div class="pane-tab${f === activeFile ? ' active' : ''}${dirtyFiles.has(f) ? ' dirty' : ''}" onclick="openFile('${esc(f)}')">
        <span>${esc(n)}</span><span class="tab-dot"></span>
        <button class="tab-close" onclick="closeTab(event,'${esc(f)}')">×</button>
      </div>`;
    }).join('');
  }

  function markDirty(f, d) { d ? dirtyFiles.add(f) : dirtyFiles.delete(f); renderTabs(); }

  function closeTab(e, f) {
    e.stopPropagation();
    openTabs = openTabs.filter(x => x !== f);
    if (activeFile === f) {
      const next = openTabs[openTabs.length - 1] || null;
      if (next) openFile(next);
      else { activeFile = null; if (editor) editor.setModel(monaco.editor.createModel('', 'plaintext')); }
    }
    renderTabs();
  }

  async function saveEditorSettings() {
    if (!project) return;
    const name = document.getElementById('epNameInput').value.trim();
    if (!name) { document.getElementById('epNameInput').focus(); return; }
    project.name = name;
    project.emoji = epEmojiCur;
    project.is_public = epPublicCur;
    document.getElementById('tbProj').textContent = name;
    const updates = { name, emoji: epEmojiCur, is_public: epPublicCur, updated_at: new Date().toISOString() };
    if (sb) {
      try {
        const { data: { session: s } } = await sb.auth.getSession();
        if (s) await sb.from('projects').update(updates).eq('id', project.id);
      } catch(e) {}
    } else {
      try {
        const list = JSON.parse(localStorage.getItem('vexium_projects') || '[]');

  async function saveNow() {
    if (!project) return;
    document.getElementById('tbSaving').classList.add('show');
    project.files = fileSystem; project.main_file = mainFile;
    if (sb) {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session) await sb.from('projects').update({ files: fileSystem, main_file: mainFile, updated_at: new Date().toISOString() }).eq('id', project.id);
      } catch(e) {}
    } else {
      try {
        const list = JSON.parse(localStorage.getItem('vexium_projects') || '[]');
        const idx = list.findIndex(p => p.id === project.id);
        if (idx >= 0) list[idx] = { ...list[idx], files: fileSystem, main_file: mainFile, updated_at: new Date().toISOString() };
        else list.unshift({ ...project, files: fileSystem, main_file: mainFile });
        localStorage.setItem('vexium_projects', JSON.stringify(list));
      } catch(e) {}

    refreshPreview();

  // ── PREVIEW ──
  function refreshPreview() {
    var frame = document.getElementById('previewFrame');
    var bridgeSrc = '(function(){var m=["log","warn","error","info"];m.forEach(function(k){var o=console[k];console[k]=function(){try{window.parent.postMessage({type:"console",kind:k,msg:Array.from(arguments).map(function(x){try{return typeof x==="object"?JSON.stringify(x,null,2):String(x)}catch(e){return String(x)}}).join(" ")},"*")}catch(e){}o.apply(console,arguments);};});window.addEventListener("error",function(e){window.parent.postMessage({type:"console",kind:"error",msg:(e.message||"Unknown error")+" (line "+e.lineno+")"},"*");});})();';
    var bridge = '<script>' + bridgeSrc + '<\/script>';
    var html = fileSystem[mainFile] || '';
    Object.entries(fileSystem).forEach(function(entry) {
      var fn = entry[0], content = entry[1];
      if (!content) return;
      var safeFn = fn.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      if (fn.endsWith('.css')) {
        var safe = content.replace(/<\/style>/gi, '<\\/style>');
        var re = new RegExp('<link[^>]+href=[\x22\x27]' + safeFn + '[\x22\x27][^>]*/?>','gi');
        html = html.replace(re, '<style>' + safe + '<\/style>');
      } else if (fn.endsWith('.js')) {
        var safe2 = content.replace(/<\/script>/gi, '<\\/script>');
        var re2 = new RegExp('<script[^>]+src=[\x22\x27]' + safeFn + '[\x22\x27][^>]*><\/script>','gi');
        html = html.replace(re2, '<script>' + safe2 + '<\/script>');
      }
    });
    if (/<head[^>]*>/i.test(html)) {
      html = html.replace(/(<head[^>]*>)/i, '$1' + bridge);
    } else {
      html = bridge + html;
    }
    var prev = frame._previewBlob;
    if (prev) URL.revokeObjectURL(prev);
    var blob = new Blob([html], { type: 'text/html' });
    var burl = URL.createObjectURL(blob);
    frame._previewBlob = burl;
    frame.src = burl;
    setUrl(mainFile); pushHist(mainFile);
  }

  function setUrl(u) { document.getElementById('prevUrl').textContent = u || mainFile; }
  function pushHist(u) { if (prevHistory[prevHistIdx] === u) return; prevHistory = prevHistory.slice(0, prevHistIdx + 1); prevHistory.push(u); prevHistIdx = prevHistory.length - 1; updateNavBtns(); }
  function prevBack() { if (prevHistIdx <= 0) return; prevHistIdx--; refreshPreview(); updateNavBtns(); }
  function prevForward() { if (prevHistIdx >= prevHistory.length - 1) return; prevHistIdx++; refreshPreview(); updateNavBtns(); }
  function updateNavBtns() { document.getElementById('btnBack').disabled = prevHistIdx <= 0; document.getElementById('btnFwd').disabled = prevHistIdx >= prevHistory.length - 1; }

  function openInViewer() {
    if (!project) return;
    saveNow().then(() => window.open('viewer.html?project=' + project.id, '_blank'));
  }

  window.addEventListener('message', e => {
    if (e.data?.type !== 'console') return;
    const body = document.getElementById('consoleBody');
    document.getElementById('conEmpty')?.remove();
    const line = document.createElement('div');
    line.className = 'con-line ' + e.data.kind;
    line.innerHTML = `<span class="con-badge-inline">${e.data.kind.toUpperCase()}</span><span class="con-msg">${escHtml(e.data.msg)}</span>`;
    body.appendChild(line); body.scrollTop = body.scrollHeight;
    if (e.data.kind === 'error') { errCnt++; const el = document.getElementById('errCount'); el.textContent = errCnt + ' err'; el.className = 'con-badge con-err-bg show'; }
    if (e.data.kind === 'warn') { warnCnt++; const el = document.getElementById('warnCount'); el.textContent = warnCnt + ' warn'; el.className = 'con-badge con-warn-bg show'; }
  });

  function clearConsole() {
    errCnt = 0; warnCnt = 0;
    document.getElementById('consoleBody').innerHTML = '<div class="con-empty" id="conEmpty">No output yet.</div>';

    document.getElementById('warnCount').className = 'con-badge';

  function enableFrame() { document.getElementById('previewFrame').style.pointerEvents = ''; }

    if (splitMode && (previewVisible || consoleVisible)) {
      panel.style.flexDirection = 'column';
      frame.style.flex = '1';
      frame.style.width = '100%';

      panel.style.flexDirection = '';

  // ── RESIZE ──
  (function() {
    const h = document.getElementById('consoleResizer'); let drag = false, startY, startH;
    h.addEventListener('mousedown', e => { drag = true; startY = e.clientY; startH = document.getElementById('consolePanel').offsetHeight; disableFrame(); e.preventDefault(); });
    document.addEventListener('mousemove', e => { if (!drag) return; document.getElementById('consolePanel').style.height = Math.max(50, Math.min(startH + (startY - e.clientY), 500)) + 'px'; });
    document.addEventListener('mouseup', () => { if (drag) { drag = false; enableFrame(); } });
  })();
  (function() {
    const h = document.getElementById('rightResizer'), panel = document.getElementById('rightPanel');
    let drag = false, startX, startW;
    h.addEventListener('mousedown', e => { drag = true; startX = e.clientX; startW = panel.offsetWidth; h.classList.add('dragging'); disableFrame(); e.preventDefault(); });
    document.addEventListener('mousemove', e => { if (!drag) return; panel.style.width = Math.max(180, Math.min(startW + (startX - e.clientX), window.innerWidth * .75)) + 'px'; if (editor) editor.layout(); });
    document.addEventListener('mouseup', () => { if (drag) { drag = false; h.classList.remove('dragging'); enableFrame(); } });

  // ── FILE OPS ──
  function promptNewFile() {
    showFileModal('New File', '', name => {
      if (!name) return;
      if (!name.includes('.')) name += '.html';
      if (fileSystem[name]) { showToast('!', 'File exists'); return; }
      fileSystem[name] = getDefault(name);
      renderFileTree(); openFile(name); saveNow();
    });

  function getDefault(n) {
    const b = n.split('/').pop();
    if (b.endsWith('.html')) return `<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8"/>\n  <title>${b.replace('.html','')}</title>\n</head>\n<body>\n  \n</body>\n</html>`;
    if (b.endsWith('.css')) return `/* ${b} */\n\n`;
    if (b.endsWith('.js')) return `// ${b}\n\n`;
    if (b.endsWith('.json')) return '{}';
    return '';
  }

  function openCtx(e, f) {
    e.stopPropagation(); ctxTarget = f;
    const m = document.getElementById('ctxMenu');
    m.style.left = Math.min(e.clientX, window.innerWidth - 160) + 'px';
    m.style.top = Math.min(e.clientY, window.innerHeight - 100) + 'px';
    m.classList.add('show');
  }
  document.addEventListener('click', () => document.getElementById('ctxMenu').classList.remove('show'));

  function ctxRename() {
    if (!ctxTarget) return;
    const cur = ctxTarget.split('/').pop();
    showFileModal('Rename', cur, newName => {
      if (!newName || newName === cur) return;
      if (!newName.includes('.')) newName += '.' + ctxTarget.split('.').pop();
      if (fileSystem[newName]) { showToast('!', 'File exists'); return; }
      fileSystem[newName] = fileSystem[ctxTarget]; delete fileSystem[ctxTarget];
      if (mainFile === ctxTarget) mainFile = newName;
      openTabs = openTabs.map(f => f === ctxTarget ? newName : f);
      if (activeFile === ctxTarget) { activeFile = newName; openFile(newName); }
      renderFileTree(); renderTabs(); saveNow(); showToast('✓', 'Renamed');
    });
  }

  function ctxSetMain() {
    if (!ctxTarget?.endsWith('.html')) { showToast('!', 'Must be .html'); return; }
    mainFile = ctxTarget; setUrl(mainFile); renderFileTree(); saveNow(); showToast('✓', ctxTarget + ' is main');
  }

  function ctxDelete() {
    if (!ctxTarget) return;
    if (Object.keys(fileSystem).length <= 1) { showToast('!', 'Cannot delete last file'); return; }
    if (!confirm('Delete ' + ctxTarget + '?')) return;
    delete fileSystem[ctxTarget];
    openTabs = openTabs.filter(f => f !== ctxTarget);
    if (activeFile === ctxTarget) {
      const next = openTabs[openTabs.length - 1] || Object.keys(fileSystem)[0] || null;
      if (next) openFile(next); else activeFile = null;
    }
    renderFileTree(); renderTabs(); saveNow(); showToast('✓', 'Deleted');
  }

  function showFileModal(title, def, cb) {
    document.getElementById('fileModalTitle').textContent = title;
    document.getElementById('fileInput').value = def || '';
    document.getElementById('fileOverlay').classList.add('show');
    fileModalCb = cb;
    setTimeout(() => { const i = document.getElementById('fileInput'); i.focus(); i.select(); }, 40);
  }
  function closeFileModal() { document.getElementById('fileOverlay').classList.remove('show'); fileModalCb = null; }
  document.getElementById('fileInput').addEventListener('keydown', e => { if (e.key === 'Enter') confirmFileModal(); if (e.key === 'Escape') closeFileModal(); });

  function showToast(icon, msg) {
    clearTimeout(window._toastT);
    document.getElementById('toastIcon').textContent = icon;
    document.getElementById('toastMsg').textContent = msg;
    const t = document.getElementById('toast');
    t.classList.add('show');
    window._toastT = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function confirmFileModal() {
    const v = document.getElementById('fileInput').value.trim();
    if (fileModalCb) fileModalCb(v);
    closeFileModal();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeFileModal(); closeAddDD(); }
  });
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveNow(); }
  });

  // ── AI CHAT ──
  var aiHistory = [];
  var aiTyping = false;
  var aiStarted = false;

  const AI_EDGE_URL = 'https://ciuqhxrxcznmgorjeumz.supabase.co/functions/v1/ai-chat';

  // File type → color (matches sidebar icons)
  function aiFileColor(name) {
    if (!name) return '#6366f1';
    if (/\.html?$/.test(name))  return '#60a5fa'; // blue
    if (/\.css$/.test(name))    return '#a78bfa'; // purple
    if (/\.js$/.test(name))     return '#fbbf24'; // yellow
    if (/\.ts$/.test(name))     return '#34d399'; // green
    if (/\.json$/.test(name))   return '#f97316'; // orange
    if (/\.md$/.test(name))     return '#94a3b8'; // slate
    if (/\.py$/.test(name))     return '#4ade80'; // lime
    return '#818cf8';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function aiAutoResize(el) {
    el.style.height = 'auto';
    el.style.overflow = 'hidden';
    const maxH = Math.round(window.innerHeight * 0.25);
    const newH = Math.min(el.scrollHeight, maxH);
    el.style.height = newH + 'px';
    el.style.overflow = el.scrollHeight > maxH ? 'auto' : 'hidden';
  }

  function aiNow() {
    var d = new Date();
    var h = d.getHours(), m = d.getMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + m.toString().padStart(2,'0') + ' ' + ampm;
  }

  function aiTransitionToChat() {
    if (aiStarted) return;
    aiStarted = true;
    document.getElementById('aiCenter').classList.add('hidden');
    document.getElementById('aiChatWrap').classList.add('show');
    document.getElementById('aiBottom').classList.add('show');
    var bi = document.getElementById('aiBottomInput');
    bi.addEventListener('input', function() { aiAutoResize(bi); });
    bi.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); aiSend(true); }
    });
    setTimeout(function() { bi.focus(); }, 60);
  }

  // 200 wpm ≈ 1000 chars/min ≈ ~60ms per char
  function aiTemplate(text) {
    var input = document.getElementById('aiInput');
    input.value = '';
    input.focus();
    var i = 0;
    function typeChar() {
      if (i < text.length) { input.value += text[i++]; aiAutoResize(input); setTimeout(typeChar, 6); }
    }
    typeChar();
  }

  // Add a user bubble, with collapse if long
  function aiAddUser(text) {
    var msgs = document.getElementById('aiMessages');
    var row = document.createElement('div');
    row.className = 'ai-row user';
    var bubble = document.createElement('div');
    bubble.className = 'ai-bubble';
    bubble.textContent = text;
    row.appendChild(bubble);

    // Collapse long messages after render
    var moreBtn = null;
    if (text.length > 320 || text.split('\n').length > 6) {
      bubble.classList.add('collapsed');
      moreBtn = document.createElement('button');
      moreBtn.className = 'ai-bubble-more';
      moreBtn.textContent = 'Show more';
      moreBtn.onclick = function() {
        bubble.classList.remove('collapsed');
        moreBtn.remove();
      };
      row.appendChild(moreBtn);
    }

    var meta = document.createElement('div');
    meta.className = 'ai-msg-meta';
    meta.innerHTML =
      '<div class="ai-msg-actions">' +
        '<button class="ai-act-btn" title="Retry" onclick="aiRetry(this)"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg></button>' +
        '<button class="ai-act-btn" title="Copy" data-copy="' + text.replace(/"/g,'&quot;') + '" onclick="aiCopyBtn(this)"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>' +
      '</div>' +
      '<div class="ai-msg-time">' + aiNow() + '</div>';
    row.appendChild(meta);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // Add an AI plain-text message with optional file cards
  function aiAddAI(text, files) {
    var msgs = document.getElementById('aiMessages');
    var row = document.createElement('div');
    row.className = 'ai-row ai';

    // Text content
    var textEl = document.createElement('div');
    textEl.className = 'ai-text';
    // Convert newlines to paragraphs
    var paras = text.trim().split(/\n\n+/);
    textEl.innerHTML = paras.map(function(p) {
      return '<p>' + escHtml(p).replace(/\n/g,'<br>') + '</p>';
    }).join('');

    // File cards
    var cardsEl = null;
    if (files && files.length) {
      cardsEl = document.createElement('div');
      cardsEl.className = 'ai-file-cards';
      files.forEach(function(f) {
        var col = aiFileColor(f.name);
        var card = document.createElement('div');
        card.className = 'ai-file-card';
        card.innerHTML = '<div class="ai-file-card-dot" style="background:' + col + '"></div><span style="color:' + col + '">' + escHtml(f.name) + '</span>';
        card.title = 'Open ' + f.name;
        var fname = f.name;
        card.onclick = function() {
          setMode('editor');
          if (!openTabs.includes(fname)) openTabs.push(fname);
          renderTabs();
          openFile(fname);
        };
        cardsEl.appendChild(card);
      });
    }

    // Meta row (copy + time, hover only)
    var rawText = text;
    var meta = document.createElement('div');
    meta.className = 'ai-msg-meta';
    meta.innerHTML =
      '<div class="ai-msg-actions">' +
        '<button class="ai-act-btn" title="Copy" data-copy-el="1" onclick="aiCopyEl(this)"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>' +
      '</div>' +
      '<div class="ai-msg-time">' + aiNow() + '</div>';

    row.appendChild(textEl);
    if (cardsEl) row.appendChild(cardsEl);
    row.appendChild(meta);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function aiShowTyping() {
    var msgs = document.getElementById('aiMessages');
    var el = document.createElement('div');
    el.className = 'ai-typing';
    el.id = 'aiTypingIndicator';
    el.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function aiHideTyping() {
    var el = document.getElementById('aiTypingIndicator');
    if (el) el.remove();
  }

  function aiCopyBtn(btn) {
    var text = btn.getAttribute('data-copy') || '';
    navigator.clipboard.writeText(text).then(function() {
      btn.classList.add('copied');
      setTimeout(function() { btn.classList.remove('copied'); }, 1800);
    });
  }

  function aiCopyEl(btn) {
    var row = btn.closest('.ai-row.ai');
    var textEl = row && row.querySelector('.ai-text');
    if (!textEl) return;
    navigator.clipboard.writeText(textEl.innerText.trim()).then(function() {
      btn.classList.add('copied');
      setTimeout(function() { btn.classList.remove('copied'); }, 1800);
    });
  }

  function aiRetry(btn) {
    var rows = Array.from(document.querySelectorAll('#aiMessages .ai-row'));
    var userRow = btn.closest('.ai-row.user');
    var idx = rows.indexOf(userRow);
    if (idx < 0) return;
    var bubble = userRow.querySelector('.ai-bubble');
    if (!bubble) return;
    var text = bubble.textContent.trim();
    // Remove from this row onward
    rows.slice(idx).forEach(function(r) { r.remove(); });
    // Trim history: remove last user message and any assistant reply
    aiHistory = aiHistory.filter(function(_, i) { return i < aiHistory.length - (aiHistory[aiHistory.length-1].role === 'assistant' ? 2 : 1); });
    // Re-send
    aiAddUser(text);
    aiHistory.push({ role: 'user', content: text });
    aiTyping = true;
    document.getElementById('aiBottomSend').disabled = true;
    document.getElementById('aiSend').disabled = true;
    aiShowTyping();
    aiCallAPI();
  }

  async function aiSend(fromBottom) {
    var input = fromBottom ? document.getElementById('aiBottomInput') : document.getElementById('aiInput');
    var text = input.value.trim();
    if (!text || aiTyping) return;
    input.value = '';
    input.style.height = '';
    aiTransitionToChat();
    aiTyping = true;
    document.getElementById('aiBottomSend').disabled = true;
    document.getElementById('aiSend').disabled = true;
    aiAddUser(text);
    aiHistory.push({ role: 'user', content: text });
    aiShowTyping();
    await aiCallAPI();
  }

  async function aiCallAPI() {
    let textEl = null;   // live text container
    let fullMessage = '';
    let rawFull = '';

    try {
      const response = await fetch(AI_EDGE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: aiHistory, files: fileSystem })
      });

      if (!response.ok) throw new Error('HTTP ' + response.status);
      if (!response.body) throw new Error('No response body');

      aiHideTyping();

      // Create the AI message row immediately (empty) so text streams in
      var msgs = document.getElementById('aiMessages');
      var row = document.createElement('div');
      row.className = 'ai-row ai';
      textEl = document.createElement('div');
      textEl.className = 'ai-text';
      row.appendChild(textEl);
      msgs.appendChild(row);

      // Read SSE stream
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // Process complete SSE lines
        const lines = buffer.split('\n');
        buffer = lines.pop() || ''; // keep incomplete last line

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line || line.startsWith(':')) continue;

          var eventMatch = line.match(/^event:\s*(.+)$/);
          var dataMatch = line.match(/^data:\s*(.+)$/);

          if (eventMatch) {
            var eventType = eventMatch[1];
            // Get next line for data
            var nextLine = lines[i + 1] || '';
            var dMatch = nextLine.match(/^data:\s*(.+)$/);
            if (!dMatch) continue;
            var data;
            try { data = JSON.parse(dMatch[1]); } catch(e) { continue; }
            i++; // skip the data line

            if (eventType === 'delta' && data.text) {
              fullMessage += data.text;
              // Render incrementally — convert \n\n to paragraphs
              textEl.innerHTML = fullMessage
                .split(/\n\n+/)
                .map(function(p) { return '<p>' + escHtml(p).replace(/\n/g,'<br>') + '</p>'; })
                .join('');
              msgs.scrollTop = msgs.scrollHeight;
            }

            if (eventType === 'done') {
              rawFull = data.raw || fullMessage;
              fullMessage = data.message || fullMessage;

              // Final render of message
              textEl.innerHTML = fullMessage
                .split(/\n\n+/)
                .map(function(p) { return '<p>' + escHtml(p).replace(/\n/g,'<br>') + '</p>'; })
                .join('');

              // Add meta row (copy + time)
              var meta = document.createElement('div');
              meta.className = 'ai-msg-meta';
              meta.innerHTML =
                '<div class="ai-msg-actions">' +
                  '<button class="ai-act-btn" title="Copy" data-copy-el="1" onclick="aiCopyEl(this)"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>' +
                '</div>' +
                '<div class="ai-msg-time">' + aiNow() + '</div>';
              row.appendChild(meta);

              // Apply file changes
              var changedFiles = data.files || [];
              if (changedFiles.length) {
                changedFiles.forEach(function(f) {
                  if (!f.name || f.content === undefined) return;
                  fileSystem[f.name] = f.content;
                  dirtyFiles.add(f.name);
                  if (!openTabs.includes(f.name)) openTabs.push(f.name);
                });

                // Add file cards
                var cardsEl = document.createElement('div');
                cardsEl.className = 'ai-file-cards';
                changedFiles.forEach(function(f) {
                  var col = aiFileColor(f.name);
                  var card = document.createElement('div');
                  card.className = 'ai-file-card';
                  card.innerHTML = '<div class="ai-file-card-dot" style="background:' + col + '"></div><span style="color:' + col + '">' + escHtml(f.name) + '</span>';
                  card.title = 'Open ' + f.name;
                  var fname = f.name;
                  card.onclick = function() {
                    setMode('editor');
                    if (!openTabs.includes(fname)) openTabs.push(fname);
                    renderTabs();
                    openFile(fname);
                  };
                  cardsEl.appendChild(card);
                });
                // Insert cards between text and meta
                row.insertBefore(cardsEl, meta);

                renderFileTree();
                renderTabs();
                var first = changedFiles[0].name;
                if (openTabs.includes(first)) openFile(first);
                previewVisible = true;
                document.getElementById('rightPanel').classList.remove('hidden');
                document.getElementById('previewFrame').style.display = 'block';
                document.getElementById('previewToolbar').style.display = '';
                document.getElementById('btnPreview').classList.add('active');
                setTimeout(refreshPreview, 100);
                saveNow();
              }

              aiHistory.push({ role: 'assistant', content: rawFull });
              msgs.scrollTop = msgs.scrollHeight;
            }

            if (eventType === 'error') {
              throw new Error(data.error || 'Stream error');
            }
          }
        }
      }

    } catch(err) {
      aiHideTyping();
      if (textEl) {
        textEl.innerHTML = '<p style="color:var(--err)">Something went wrong: ' + escHtml(err.message) + '</p>';
      } else {
        aiAddAI('Something went wrong: ' + err.message, []);
      }
      console.error('AI error:', err);
    }

    aiTyping = false;
    document.getElementById('aiBottomSend').disabled = false;
    document.getElementById('aiSend').disabled = false;
  }

  document.addEventListener('DOMContentLoaded', function() {
    var centerInput = document.getElementById('aiInput');
    if (centerInput) {
      centerInput.addEventListener('input', function() { aiAutoResize(centerInput); });
      centerInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); aiSend(false); }
      });
    }
  });

  window.addEventListener('beforeunload', () => { if (dirtyFiles.size > 0) saveNow(); });
  window.addEventListener('load', init);
</script>
