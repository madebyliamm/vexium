<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Home — Vexium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    a{color:inherit;text-decoration:none}
    a:visited{color:inherit}
    :root{
      --bg:#020209;--s1:#06060f;--s2:#09091a;--b1:#111125;--b2:#18182e;--b3:#22223a;
      --a1:#4f6ef7;--a2:#9b79fc;--text:#f0f0ff;--sub:#6060a0;--dim:#1a1a35;
      --sans:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono','Fira Code',monospace;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

    /* ── TOPBAR ── */
    #topbar{
      position:sticky;top:0;z-index:100;
      height:54px;padding:0 40px;
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(2,2,9,.9);backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,.04);
    }
    .tb-logo{color:var(--text);display:flex;align-items:center;gap:9px;text-decoration:none}
    .tb-logo img{width:22px;height:22px;border-radius:5px}
    .tb-logo-t{color:var(--text);font-family:var(--sans);font-size:15px;font-weight:800}
    .tb-logo-t span{background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .tb-r{display:flex;align-items:center;gap:12px}
    .tb-name{font-size:13px;font-weight:600;color:var(--sub)}
    .tb-pfp{
      width:32px;height:32px;border-radius:50%;
      background:linear-gradient(135deg,var(--a1),var(--a2));
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:800;color:#fff;cursor:pointer;
      text-decoration:none;flex-shrink:0;
    }
    .tb-btn{background:transparent;border:1px solid var(--b2);color:var(--sub);padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s}
    .tb-btn:hover{background:rgba(255,255,255,.03);color:var(--text);border-color:var(--b3)}

    /* ── PAGE ── */
    .page{max-width:1040px;margin:0 auto;padding:48px 40px}

    /* ── HEADER ROW ── */
    .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px}
    .page-title{font-family:var(--sans);font-size:24px;font-weight:800;letter-spacing:-.5px}
    .page-sub{font-size:13px;color:var(--sub);margin-top:3px}
    .new-btn{
      display:flex;align-items:center;gap:7px;
      padding:10px 22px;border-radius:9px;
      background:linear-gradient(135deg,var(--a1),var(--a2));
      color:#fff;font-size:13px;font-weight:700;
      border:none;cursor:pointer;font-family:var(--sans);
      box-shadow:0 0 20px rgba(79,110,247,.25);transition:all .2s;
    }
    .new-btn:hover{transform:translateY(-1px);box-shadow:0 0 36px rgba(79,110,247,.45)}

    /* ── EMPTY ── */
    .empty{
      text-align:center;padding:80px 20px;
      border:1px dashed var(--b2);border-radius:14px;
      display:none;
    }
    .empty.show{display:block}
    .empty-icon{font-size:40px;margin-bottom:16px}
    .empty-t{font-size:16px;font-weight:700;margin-bottom:6px}
    .empty-s{font-size:13px;color:var(--sub);margin-bottom:24px}

    /* ── PROJECT GRID ── */
    #projectGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

    /* ── PROJECT CARD ── */
    .proj-card{
      background:var(--s1);border:1px solid var(--b1);border-radius:12px;
      padding:22px 20px;cursor:pointer;transition:all .2s;
      position:relative;overflow:hidden;text-decoration:none;display:block;
    }
    .proj-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(79,110,247,.03),rgba(155,121,252,.03));opacity:0;transition:opacity .2s}
    .proj-card:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
    .proj-card:hover::before{opacity:1}
    .pc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
    .pc-emoji{font-size:24px;line-height:1}
    .pc-more{opacity:0;background:transparent;border:none;color:var(--sub);width:26px;height:26px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0;position:relative;z-index:10}
    .proj-card:hover .pc-more{opacity:1}
    .pc-more:hover{background:var(--b2);color:var(--text)}
    .pc-name{font-size:15px;font-weight:700;margin-bottom:4px;letter-spacing:-.2px}
    .pc-files{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:5px}
    .pc-dot{width:3px;height:3px;border-radius:50%;background:var(--sub)}
    .pc-updated{font-size:11px;color:var(--sub)}
    .pc-tags{display:flex;gap:5px;margin-top:12px;flex-wrap:wrap}
    .pc-tag{
      font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
      padding:2px 7px;border-radius:4px;
    }
    .pc-tag.html{background:rgba(79,110,247,.1);color:#818cf8}
    .pc-tag.css{background:rgba(155,121,252,.1);color:#c4b5fd}
    .pc-tag.js{background:rgba(251,191,36,.08);color:#fcd34d}

    /* ── CONTEXT MENU ── */
    .ctx{position:fixed;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:4px;min-width:150px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none}
    .ctx.show{display:block}
    .ctx-item{padding:8px 12px;font-size:12px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px;color:var(--text);transition:background .1s}
    .ctx-item:hover{background:var(--b2)}
    .ctx-item.danger{color:#ef4444}
    .ctx-item.danger:hover{background:rgba(239,68,68,.1)}
    .ctx-ico{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:.6}

    /* ── MODAL ── */
    .overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);align-items:center;justify-content:center}
    .overlay.show{display:flex}
    .modal{background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:32px;width:360px;max-width:90vw;box-shadow:0 40px 80px rgba(0,0,0,.7)}
    .modal-t{font-family:var(--sans);font-size:18px;font-weight:800;margin-bottom:22px;letter-spacing:-.3px}
    .m-field{margin-bottom:14px}
    .m-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block}
    .m-input{width:100%;background:var(--bg);border:1px solid var(--b2);border-radius:9px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;font-family:var(--sans);transition:border-color .15s}
    .m-input:focus{border-color:rgba(79,110,247,.4)}
    .m-input::placeholder{color:var(--sub)}
    .emoji-row{display:flex;gap:8px;flex-wrap:wrap}
    .emoji-opt{font-size:22px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .15s;user-select:none}
    .emoji-opt:hover{background:var(--b2)}
    .emoji-opt.sel{background:rgba(79,110,247,.1);border-color:rgba(79,110,247,.3)}
    .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:22px}
    .mbtn{padding:9px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--sans);transition:all .15s}
    .mbtn-cancel{background:var(--b2);color:var(--sub)}
    .mbtn-cancel:hover{background:var(--b3);color:var(--text)}
    .mbtn-ok{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff}
    .mbtn-ok:hover{opacity:.9}

    /* ── LOADING ── */
    .loading{text-align:center;padding:60px;color:var(--sub);font-size:13px}

    @media(max-width:640px){
      #topbar{padding:0 16px}
      .page{padding:32px 16px}
      .page-head{flex-direction:column;align-items:flex-start;gap:14px}
    }
  </style>
</head>
<body>

<div id="topbar">
  <a href="index.html" class="tb-logo">
    <img src="vexium_logo.png" alt="V"/>
    <span class="tb-logo-t">VEXIUM<span>.AI</span></span>
  </a>
  <div class="tb-r">
    <span class="tb-name" id="tbName">—</span>
    <a href="profile.html" class="tb-pfp" id="tbPfp">?</a>
  </div>
</div>

<div class="page">
  <div class="page-head">
    <div>
      <div class="page-title">Projects</div>
      <div class="page-sub" id="pageSubCount">Loading…</div>
    </div>
    <button class="new-btn" onclick="openNewModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New project
    </button>
  </div>

  <div class="loading" id="loadingState">Loading projects…</div>
  <div class="empty" id="emptyState">
    <div class="empty-icon">💻</div>
    <div class="empty-t">No projects yet</div>
    <div class="empty-s">Create your first project and start building.</div>
    <button class="new-btn" style="margin:0 auto" onclick="openNewModal()">+ New project</button>
  </div>
  <div id="projectGrid"></div>
</div>

<!-- CTX MENU -->
<div class="ctx" id="ctxMenu">
  <div class="ctx-item" onclick="ctxOpen()">
    <svg class="ctx-ico" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Open
  </div>
  <div class="ctx-item" onclick="ctxRename()">
    <svg class="ctx-ico" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Rename
  </div>
  <div class="ctx-item danger" onclick="ctxDelete()">
    <svg class="ctx-ico" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Delete
  </div>
</div>

<!-- NEW / RENAME MODAL -->
<div class="overlay" id="newOverlay">
  <div class="modal">
    <div class="modal-t" id="modalTitle">New project</div>
    <div class="m-field">
      <label class="m-label">Icon</label>
      <div class="emoji-row" id="emojiRow">
        💻 🚀 🎨 ⚡ 🔥 🛠 🌐 📱 🎯 🧪
      </div>
    </div>
    <div class="m-field">
      <label class="m-label">Name</label>
      <input class="m-input" id="projNameInput" placeholder="my-project" autocomplete="off"/>
    </div>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn mbtn-ok" onclick="confirmModal()">Create →</button>
    </div>
  </div>
</div>

<script src="config.js" onerror="window._noConfig=true"></script>



  <script>
  let sb = null;
  let session = null;
  let projects = [];
  let ctxTarget = null;
  let modalMode = 'new'; // 'new' | 'rename'
  let selectedEmoji = '💻';

  const EMOJIS = ['💻','🚀','🎨','⚡','🔥','🛠','🌐','📱','🎯','🧪','✨','🦄'];

  try {
    if (!window._noConfig && typeof supabase !== 'undefined' && typeof SUPABASE_URL !== 'undefined') {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch(e) {}

  async function init() {
    // Set user info
    const username = localStorage.getItem('vexium_username') || 'Guest';
    document.getElementById('tbName').textContent = username;
    document.getElementById('tbPfp').textContent = username.charAt(0).toUpperCase();

    if (sb) {
      try {
        const { data } = await sb.auth.getSession();
        session = data?.session;
        if (!session && !localStorage.getItem('vexium_guest')) {
          window.location.href = 'auth.html'; return;
        }
      } catch(e) {}
    }
    buildEmojiRow();
    await loadProjects();
  }

  function buildEmojiRow() {
    const row = document.getElementById('emojiRow');
    row.innerHTML = EMOJIS.map(e =>
      `<div class="emoji-opt${e==='💻'?' sel':''}" onclick="pickEmoji('${e}')">${e}</div>`
    ).join('');
  }

  function pickEmoji(e) {
    selectedEmoji = e;
    document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('sel', el.textContent === e));
  }

  async function loadProjects() {
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('emptyState').classList.remove('show');
    document.getElementById('projectGrid').innerHTML = '';

    if (session && sb) {
      try {
        const { data } = await sb.from('projects').select('*').eq('user_id', session.user.id).order('updated_at', { ascending: false });
        projects = data || [];
      } catch(e) { projects = []; }
    } else {
      try { projects = JSON.parse(localStorage.getItem('vexium_projects') || '[]'); } catch(e) { projects = []; }
    }

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('pageSubCount').textContent = projects.length + ' project' + (projects.length !== 1 ? 's' : '');

    if (!projects.length) {
      document.getElementById('emptyState').classList.add('show'); return;
    }
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('projectGrid');
    grid.innerHTML = projects.map(p => {
      const files = Object.keys(p.files || {});
      const types = [...new Set(files.map(f => f.split('.').pop()))];
      const updated = p.updated_at ? relativeTime(new Date(p.updated_at)) : 'just now';
      return `
        <a class="proj-card" href="#" onclick="openProject(event,'${p.id}')">
          <div class="pc-top">
            <div class="pc-emoji">${p.emoji || '💻'}</div>
            <button class="pc-more" onclick="openCtx(event,'${p.id}')">⋯</button>
          </div>
          <div class="pc-name">${esc(p.name || 'Untitled')}</div>
          <div class="pc-files">
            <span>${files.length} file${files.length !== 1 ? 's' : ''}</span>
            <div class="pc-dot"></div>
            <span class="pc-updated">${updated}</span>
          </div>
          <div class="pc-tags">
            ${types.includes('html') ? '<div class="pc-tag html">HTML</div>' : ''}
            ${types.includes('css') ? '<div class="pc-tag css">CSS</div>' : ''}
            ${types.includes('js') ? '<div class="pc-tag js">JS</div>' : ''}
          </div>
        </a>
      `;
    }).join('');
  }

  function openProject(e, id) {
    e.preventDefault();
    localStorage.setItem('vexium_current_project', id);
    window.location.href = 'editor.html';
  }

  function openCtx(e, id) {
    e.preventDefault(); e.stopPropagation();
    ctxTarget = id;
    const menu = document.getElementById('ctxMenu');
    menu.style.left = Math.min(e.clientX, window.innerWidth - 160) + 'px';
    menu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
    menu.classList.add('show');
  }

  document.addEventListener('click', () => document.getElementById('ctxMenu').classList.remove('show'));

  function ctxOpen() { if (!ctxTarget) return; localStorage.setItem('vexium_current_project', ctxTarget); window.location.href = 'editor.html'; }

  function ctxRename() {
    if (!ctxTarget) return;
    const p = projects.find(x => x.id === ctxTarget);
    if (!p) return;
    modalMode = 'rename';
    document.getElementById('modalTitle').textContent = 'Rename project';
    document.getElementById('projNameInput').value = p.name || '';
    document.querySelector('.mbtn-ok').textContent = 'Rename →';
    openModal();
  }

  async function ctxDelete() {
    if (!ctxTarget) return;
    if (!confirm('Delete this project? This cannot be undone.')) return;
    if (session && sb) {
      await sb.from('projects').delete().eq('id', ctxTarget);
    } else {
      projects = projects.filter(p => p.id !== ctxTarget);
      localStorage.setItem('vexium_projects', JSON.stringify(projects));
    }
    await loadProjects();
  }

  // ── MODAL ──
  function openNewModal() {
    modalMode = 'new';
    document.getElementById('modalTitle').textContent = 'New project';
    document.getElementById('projNameInput').value = '';
    document.querySelector('.mbtn-ok').textContent = 'Create →';
    selectedEmoji = '💻';
    buildEmojiRow();
    openModal();
  }

  function openModal() {
    document.getElementById('newOverlay').classList.add('show');
    setTimeout(() => document.getElementById('projNameInput').focus(), 40);
  }

  function closeModal() { document.getElementById('newOverlay').classList.remove('show'); }

  document.getElementById('newOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  // Custom confirm dialog
  window.addEventListener('load', init);
</script>
</body>
</html>
