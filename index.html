<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vexium — Build your website with AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #06060a;
      --surface:   #0c0c12;
      --border:    rgba(255, 255, 255, .06);
      --border-2:  rgba(255, 255, 255, .10);
      --text:      #f0f0fa;
      --muted:     rgba(255, 255, 255, .38);
      --accent:    #5b6ef5;
      --accent-2:  #9b6ef5;
      --sans:      'Plus Jakarta Sans', sans-serif;
      --display:   'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ─── NAV ─────────────────────────────────────────────────────────── */
    #nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      padding: 16px 24px;
      transition: padding 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Pill container — this is what scales and blurs */
    .nav-pill {
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 1100px;
      height: 52px;
      background: rgba(12, 12, 20, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0 6px 0 18px;
      transition:
        height          0.4s cubic-bezier(0.16, 1, 0.3, 1),
        border-color    0.4s ease,
        background      0.4s ease,
        border-radius   0.4s cubic-bezier(0.16, 1, 0.3, 1),
        box-shadow      0.4s ease;
    }

    /* Scrolled state — shrinks and tightens */
    #nav.scrolled {
      padding: 10px 24px;
    }
    #nav.scrolled .nav-pill {
      height: 44px;
      border-color: var(--border-2);
      background: rgba(10, 10, 16, 0.85);
      border-radius: 999px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, .04);
    }

    /* Logo */
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-logo-mark {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 14px rgba(91, 110, 245, 0.35);
      flex-shrink: 0;
    }
    .nav-logo-mark svg {
      width: 13px;
      height: 13px;
      fill: #fff;
    }

    .nav-logo-name {
      font-family: var(--display);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    /* Center links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      margin: 0 auto;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease, background 0.15s ease;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }
    .nav-link:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    /* Badge on a nav link */
    .nav-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 2px 5px;
      border-radius: 4px;
      background: rgba(91, 110, 245, 0.15);
      color: #818cf8;
      border: 1px solid rgba(91, 110, 245, 0.2);
      line-height: 1;
    }

    /* Right side */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .nav-btn-ghost {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: var(--sans);
      transition: color 0.15s ease, background 0.15s ease;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }
    .nav-btn-ghost:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-btn-primary {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      cursor: pointer;
      font-family: var(--sans);
      letter-spacing: -0.01em;
      transition: opacity 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
      white-space: nowrap;
      box-shadow: 0 0 18px rgba(91, 110, 245, 0.3);
    }
    .nav-btn-primary:hover {
      opacity: 0.88;
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(91, 110, 245, 0.45);
    }

    /* Mobile — hide center links below 768px */
    .nav-mobile-toggle {
      display: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .nav-mobile-toggle:hover { background: rgba(255,255,255,0.05); }
    .nav-mobile-toggle svg { width: 16px; height: 16px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; }

    @media (max-width: 820px) {
      .nav-links { display: none; }
      .nav-mobile-toggle { display: flex; }
      .nav-right { gap: 4px; }
      .nav-btn-ghost { display: none; }
    }
    @media (max-width: 480px) {
      #nav { padding: 12px 14px; }
      .nav-pill { padding: 0 4px 0 14px; }
    }

    /* ─── PAGE BODY PLACEHOLDER ───────────────────────────────────────── */
    /* Temporary spacer so nav has something to scroll over */
    .page-placeholder {
      min-height: 300vh;
      padding-top: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-inline: 24px;
      gap: 12px;
    }
    .page-placeholder p {
      font-size: 13px;
      color: rgba(255,255,255,0.12);
      font-family: var(--sans);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════
       NAV
  ═══════════════════════════════════════════ -->
  <nav id="nav" role="navigation" aria-label="Main">
    <div class="nav-pill">

      <!-- Logo -->
      <a href="/" class="nav-logo" aria-label="Vexium home">
        <div class="nav-logo-mark">
          <svg viewBox="0 0 24 24"><path d="M12 2L9.1 9.1 2 12l7.1 2.9L12 22l2.9-7.1L22 12l-7.1-2.9z"/></svg>
        </div>
        <span class="nav-logo-name">Vexium</span>
      </a>

      <!-- Center links -->
      <div class="nav-links" role="list">
        <a href="#features" class="nav-link" role="listitem">Features</a>
        <a href="#how-it-works" class="nav-link" role="listitem">How it works</a>
        <a href="#pricing" class="nav-link" role="listitem">
          Pricing
        </a>
        <a href="/blog" class="nav-link" role="listitem">Blog</a>
        <a href="#" class="nav-link" role="listitem">
          Changelog
          <span class="nav-badge">New</span>
        </a>
      </div>

      <!-- Right -->
      <div class="nav-right">
        <a href="/auth.html" class="nav-btn-ghost">Sign in</a>
        <a href="/auth.html?signup=1" class="nav-btn-primary">Start free</a>
        <button class="nav-mobile-toggle" aria-label="Open menu" onclick="toggleMobileNav()">
          <svg viewBox="0 0 24 24"><line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/></svg>
        </button>
      </div>

    </div>
  </nav>

  <!-- placeholder body content -->
  <div class="page-placeholder" aria-hidden="true">
    <p>Hero section coming next</p>
  </div>

  <script>
    // ── Scroll shrink behaviour ─────────────────────────────────────────
    const nav = document.getElementById('nav');
    let ticking = false;

    function updateNav() {
      nav.classList.toggle('scrolled', window.scrollY > 24);
      ticking = false;
    }

    window.addEventListener('scroll', () => {
      if (!ticking) { requestAnimationFrame(updateNav); ticking = true; }
    }, { passive: true });

    // Run once on load in case page is already scrolled
    updateNav();

    // ── Mobile nav toggle ───────────────────────────────────────────────
    // Minimal — just toggles links for now, full mobile menu later
    function toggleMobileNav() {
      const links = document.querySelector('.nav-links');
      const isOpen = links.style.display === 'flex';
      links.style.display = isOpen ? '' : 'flex';
      links.style.flexDirection = 'column';
      links.style.position = 'absolute';
      links.style.top = '70px';
      links.style.left = '12px';
      links.style.right = '12px';
      links.style.background = 'rgba(12, 12, 20, 0.98)';
      links.style.backdropFilter = 'blur(20px)';
      links.style.border = '1px solid rgba(255,255,255,0.08)';
      links.style.borderRadius = '14px';
      links.style.padding = '8px';
      links.style.gap = '2px';
      links.style.zIndex = '200';
    }
  </script>
</body>
</html>
