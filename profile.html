<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Profile — Vexium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    a{color:inherit;text-decoration:none}
    a:visited{color:inherit}
    :root{
      --bg:#020209;--s1:#06060f;--s2:#09091a;--b1:#111125;--b2:#18182e;--b3:#22223a;
      --a1:#4f6ef7;--a2:#9b79fc;--text:#f0f0ff;--sub:#6060a0;--err:#ef4444;--ok:#22c55e;
      --sans:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono','Fira Code',monospace;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}

    /* TOPBAR */
    #topbar{
      height:54px;padding:0 40px;
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(2,2,9,.9);backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,.04);
      position:sticky;top:0;z-index:100;
    }
    .tb-logo{color:var(--text);display:flex;align-items:center;gap:9px;text-decoration:none}
    .tb-logo img{width:22px;height:22px;border-radius:5px}
    .tb-logo-t{color:var(--text);font-family:var(--sans);font-size:15px;font-weight:800}
    .tb-logo-t span{background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .tb-r{display:flex;align-items:center;gap:10px}
    .tb-link{font-size:13px;color:var(--sub);text-decoration:none;padding:6px 14px;border-radius:7px;font-weight:600;transition:all .15s}
    .tb-link:hover{color:var(--text);background:rgba(255,255,255,.04)}

    /* PAGE */
    .page{max-width:680px;margin:0 auto;padding:56px 40px}

    /* PROFILE CARD */
    .profile-card{
      background:var(--s1);border:1px solid var(--b1);border-radius:16px;
      padding:36px;margin-bottom:20px;
    }
    .pc-top{display:flex;align-items:center;gap:20px;margin-bottom:28px}
    .pfp-wrap{position:relative;flex-shrink:0}
    .pfp{
      width:72px;height:72px;border-radius:50%;
      background:linear-gradient(135deg,var(--a1),var(--a2));
      display:flex;align-items:center;justify-content:center;
      font-family:var(--sans);font-size:28px;font-weight:800;color:#fff;
      cursor:pointer;position:relative;overflow:hidden;
      transition:filter .2s;
    }
    .pfp:hover{filter:brightness(.8)}
    .pfp-edit{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.5);opacity:0;transition:opacity .2s;font-size:11px;font-weight:700;color:#fff;
    }
    .pfp:hover .pfp-edit{opacity:1}
    .pc-info{flex:1}
    .pc-name-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
    .pc-name{font-family:var(--sans);font-size:22px;font-weight:800;letter-spacing:-.5px}
    .pc-badge{font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:5px;background:rgba(79,110,247,.1);color:#818cf8;border:1px solid rgba(79,110,247,.15)}
    .pc-handle{font-size:13px;color:var(--sub)}

    /* STATS ROW */
    .stats-row{display:flex;gap:1px;background:var(--b1);border-radius:10px;overflow:hidden;margin-bottom:28px}
    .stat{flex:1;padding:14px 18px;background:var(--s2);text-align:center}
    .stat-n{font-family:var(--sans);font-size:20px;font-weight:800;background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px}
    .stat-l{font-size:11px;color:var(--sub);margin-top:2px}

    /* SECTION */
    .sec-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:14px}

    /* FORM */
    .form-card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:28px;margin-bottom:16px}
    .field{margin-bottom:14px}
    label{display:block;font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
    input,textarea{width:100%;background:var(--bg);border:1px solid var(--b2);border-radius:9px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;font-family:var(--sans);transition:border-color .15s;resize:none}
    input:focus,textarea:focus{border-color:rgba(79,110,247,.4)}
    input::placeholder,textarea::placeholder{color:var(--sub)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .save-btn{
      padding:10px 24px;border-radius:9px;
      background:linear-gradient(135deg,var(--a1),var(--a2));
      color:#fff;font-size:13px;font-weight:700;
      border:none;cursor:pointer;font-family:var(--sans);transition:all .2s;
    }
    .save-btn:hover{opacity:.9;transform:translateY(-1px)}

    /* DANGER */
    .danger-card{background:var(--s1);border:1px solid rgba(239,68,68,.15);border-radius:16px;padding:28px;margin-bottom:16px}
    .danger-t{font-size:14px;font-weight:700;margin-bottom:5px}
    .danger-s{font-size:12px;color:var(--sub);margin-bottom:16px;line-height:1.6}
    .danger-btn{padding:9px 20px;border-radius:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--err);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .15s}
    .danger-btn:hover{background:rgba(239,68,68,.18)}

    /* TOAST */
    #toast{position:fixed;bottom:18px;left:18px;z-index:9999;background:var(--s1);border:1px solid var(--b2);border-radius:8px;padding:9px 16px;font-size:12px;display:flex;align-items:center;gap:8px;transform:translateY(50px);opacity:0;transition:all .22s;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    #toast.show{transform:translateY(0);opacity:1}
    .msg{font-size:12px;min-height:16px;margin-top:8px}
    .msg.ok{color:var(--ok)}
    .msg.err{color:var(--err)}

    @media(max-width:640px){
      #topbar{padding:0 16px}
      .page{padding:32px 16px}
      .form-row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<div id="topbar">
  <a href="index.html" class="tb-logo">
    <img src="vexium_logo.png" alt="V"/>
    <span class="tb-logo-t">VEXIUM<span>.AI</span></span>
  </a>
  <div class="tb-r">
    <a href="home.html" class="tb-link">← Projects</a>
  </div>
</div>

<div class="page">

  <!-- PROFILE HEADER -->
  <div class="profile-card">
    <div class="pc-top">
      <div class="pfp-wrap">
        <div class="pfp" id="pfpEl">
          <span id="pfpInitial">?</span>
          <div class="pfp-edit">Edit</div>
        </div>
      </div>
      <div class="pc-info">
        <div class="pc-name-row">
          <div class="pc-name" id="pcName">Loading…</div>
          <div class="pc-badge" id="pcBadge">Free</div>
        </div>
        <div class="pc-handle" id="pcHandle">@—</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-n" id="statProjects">0</div>
        <div class="stat-l">Projects</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="statFiles">0</div>
        <div class="stat-l">Files</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="statDays">0</div>
        <div class="stat-l">Days active</div>
      </div>
    </div>
  </div>

  <!-- EDIT PROFILE -->
  <div class="sec-t" style="margin-left:2px">Edit profile</div>
  <div class="form-card">
    <div class="form-row">
      <div class="field">
        <label>Display name</label>
        <input type="text" id="fName" placeholder="Your name"/>
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="fUsername" placeholder="username" autocomplete="off"/>
      </div>
    </div>
    <div class="field">
      <label>Bio</label>
      <textarea id="fBio" rows="3" placeholder="Tell the world what you're building…"></textarea>
    </div>
    <button class="save-btn" onclick="saveProfile()">Save changes</button>
    <div class="msg" id="profileMsg"></div>
  </div>

  <!-- CHANGE PASSWORD -->
  <div class="sec-t" style="margin-left:2px;margin-top:28px">Security</div>
  <div class="form-card">
    <div class="form-row">
      <div class="field">
        <label>New password</label>
        <input type="password" id="fPass" placeholder="New password"/>
      </div>
      <div class="field">
        <label>Confirm</label>
        <input type="password" id="fPassConfirm" placeholder="Confirm password"/>
      </div>
    </div>
    <button class="save-btn" onclick="changePassword()">Update password</button>
    <div class="msg" id="passMsg"></div>
  </div>

  <!-- DANGER ZONE -->
  <div class="sec-t" style="margin-left:2px;margin-top:28px">Danger zone</div>
  <div class="danger-card">
    <div class="danger-t">Sign out</div>
    <div class="danger-s">Sign out of your account on this device.</div>
    <button class="danger-btn" onclick="doSignOut()">Sign out</button>
  </div>
  <div class="danger-card">
    <div class="danger-t">Delete account</div>
    <div class="danger-s">Permanently delete your account and all projects. This action cannot be undone.</div>
    <button class="danger-btn" onclick="deleteAccount()">Delete my account</button>
  </div>

</div>

<div id="toast"><span id="toastIcon"></span><span id="toastMsg" style="margin-left:4px"></span></div>

<script src="config.js" onerror="window._noConfig=true"></script>
<script>
  let sb = null, session = null;
  try {
    if (!window._noConfig && typeof supabase !== 'undefined' && typeof SUPABASE_URL !== 'undefined') {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch(e) {}

  async function init() {
    const username = localStorage.getItem('vexium_username') || 'Guest';
    document.getElementById('pfpInitial').textContent = username.charAt(0).toUpperCase();
    document.getElementById('pcName').textContent = username;
    document.getElementById('pcHandle').textContent = '@' + username.toLowerCase();
    document.getElementById('fName').value = username;
    document.getElementById('fUsername').value = username.toLowerCase();

    if (sb) {
      try {
        const { data } = await sb.auth.getSession();
        session = data?.session;
        if (session?.user?.user_metadata) {
          const meta = session.user.user_metadata;
          if (meta.username) {
            document.getElementById('pcHandle').textContent = '@' + meta.username;
            document.getElementById('fUsername').value = meta.username;
          }
          if (meta.bio) document.getElementById('fBio').value = meta.bio;
        }
        document.getElementById('pcBadge').textContent = session ? 'Cloud' : 'Local';
      } catch(e) {}
    }

    // Load project stats
    let projects = [];
    if (session && sb) {
      try {
        const { data } = await sb.from('projects').select('*').eq('user_id', session.user.id);
        projects = data || [];
      } catch(e) {}
    } else {
      try { projects = JSON.parse(localStorage.getItem('vexium_projects') || '[]'); } catch(e) {}
    }

    const totalFiles = projects.reduce((acc, p) => acc + Object.keys(p.files || {}).length, 0);
    document.getElementById('statProjects').textContent = projects.length;
    document.getElementById('statFiles').textContent = totalFiles;

    // Days since first project
    if (projects.length) {
      const earliest = projects.reduce((min, p) => {
        const d = new Date(p.created_at || Date.now());
        return d < min ? d : min;
      }, new Date());
      const days = Math.max(1, Math.floor((Date.now() - earliest.getTime()) / 86400000));
      document.getElementById('statDays').textContent = days;
    }
  }

  async function saveProfile() {
    const name = document.getElementById('fName').value.trim();
    const username = document.getElementById('fUsername').value.trim().toLowerCase();
    const bio = document.getElementById('fBio').value.trim();
    const msg = document.getElementById('profileMsg');

    if (!name) { msg.textContent = 'Enter a display name.'; msg.className = 'msg err'; return; }

    localStorage.setItem('vexium_username', name);
    document.getElementById('pcName').textContent = name;
    document.getElementById('pfpInitial').textContent = name.charAt(0).toUpperCase();
    document.getElementById('pcHandle').textContent = '@' + username;

    if (session && sb) {
      try {
        await sb.auth.updateUser({ data: { username, display_name: name, bio } });
      } catch(e) {}
    }

    msg.textContent = 'Profile updated.';
    msg.className = 'msg ok';
    showToast('✓', 'Saved');
    setTimeout(() => { msg.textContent = ''; msg.className = 'msg'; }, 3000);
  }

  async function changePassword() {
    const pass = document.getElementById('fPass').value;
    const confirm = document.getElementById('fPassConfirm').value;
    const msg = document.getElementById('passMsg');

    if (pass.length < 6) { msg.textContent = 'Password must be 6+ characters.'; msg.className = 'msg err'; return; }
    if (pass !== confirm) { msg.textContent = 'Passwords don\'t match.'; msg.className = 'msg err'; return; }

    if (!session || !sb) {
      msg.textContent = 'Sign in to change your password.'; msg.className = 'msg err'; return;
    }

    try {
      const { error } = await sb.auth.updateUser({ password: pass });
      if (error) { msg.textContent = error.message; msg.className = 'msg err'; return; }
      msg.textContent = 'Password updated.'; msg.className = 'msg ok';
      document.getElementById('fPass').value = '';
      document.getElementById('fPassConfirm').value = '';
      showToast('✓', 'Password updated');
      setTimeout(() => { msg.textContent = ''; msg.className = 'msg'; }, 3000);
    } catch(e) { msg.textContent = 'Something went wrong.'; msg.className = 'msg err'; }
  }

  async function doSignOut() {
    if (!confirm('Sign out?')) return;
    if (sb) { try { await sb.auth.signOut(); } catch(e) {} }
    localStorage.removeItem('vexium_guest');
    localStorage.removeItem('vexium_username');
    window.location.href = 'auth.html';
  }

  async function deleteAccount() {
    if (!confirm('Delete your account and all projects? This cannot be undone.')) return;
    if (sb && session) {
      try {
        // Calls a security definer function that deletes the auth.users row,
        // which cascades to profiles + projects automatically
        await sb.rpc('delete_own_account');
      } catch(e) {}
    }
    localStorage.clear();
    window.location.href = 'index.html';
  }

  let toastT;
  function showToast(icon, msg) {
    clearTimeout(toastT);
    document.getElementById('toastIcon').textContent = icon;
    document.getElementById('toastMsg').textContent = msg;
    document.getElementById('toast').classList.add('show');
    toastT = setTimeout(() => document.getElementById('toast').classList.remove('show'), 2200);
  }

  // Custom confirm dialog
  window.addEventListener('load', init);
</script>

</body>
</html>
