<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Profile — Vexium</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#020208;--s1:#06060f;--s2:#0a0a16;--b1:#13131e;--b2:#1c1c2e;--b3:#26263a;--a1:#4f6ef7;--a2:#9b79fc;--a3:#06d6a0;--text:#f2f2ff;--sub:#7070a0;--err:#ef4444;--sans:'Plus Jakarta Sans',sans-serif;--display:'Syne',sans-serif;--mono:'JetBrains Mono','Fira Code',monospace;}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
    .g{background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    nav{height:58px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50}
    .nav-logo{display:flex;align-items:center;gap:7px;text-decoration:none}
    .nav-logo img{width:22px;height:22px;border-radius:5px}
    .nav-logo-t{font-family:var(--display);font-size:15px;font-weight:800;color:var(--text)}
    .nav-back{margin-left:0;font-size:13px;color:var(--sub);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .15s}
    .nav-back:hover{color:var(--text)}
    .nav-spacer{flex:1}
    .nav-user{display:flex;align-items:center;gap:8px;text-decoration:none;font-size:13px;font-weight:600;color:var(--sub);padding:5px 10px;border-radius:8px;transition:all .15s}
    .nav-user:hover{background:var(--b2);color:var(--text)}
    .nav-user-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
    main{max-width:800px;margin:0 auto;padding:40px 24px 80px}
    /* PROFILE HEADER */
    .prof-header{display:flex;align-items:flex-start;gap:24px;margin-bottom:40px}
    .prof-av-wrap{position:relative;flex-shrink:0}
    .prof-av{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:36px;font-weight:800;color:#fff;border:3px solid var(--b2)}
    .prof-av-edit{position:absolute;bottom:2px;right:2px;width:26px;height:26px;background:var(--b2);border:2px solid var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
    .prof-av-edit:hover{background:var(--a1)}
    .prof-av-edit input{position:absolute;inset:0;opacity:0;cursor:pointer;border-radius:50%}
    .prof-info{flex:1;min-width:0}
    .prof-username{font-family:var(--display);font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
    .prof-bio{font-size:14px;color:var(--sub);line-height:1.6;margin-bottom:12px;min-height:22px}
    .prof-bio-empty{font-style:italic;color:var(--b3)}
    .prof-stats{display:flex;gap:20px;margin-bottom:14px}
    .prof-stat{text-align:center}
    .prof-stat-n{font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:-.5px}
    .prof-stat-l{font-size:11px;color:var(--sub)}
    .prof-actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn-edit{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .15s;background:var(--b2);border:1px solid var(--b3);color:var(--text)}
    .btn-edit:hover{background:var(--b3)}
    .btn-add{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s;background:linear-gradient(135deg,var(--a1),var(--a2));border:none;color:#fff;box-shadow:0 0 16px rgba(79,110,247,.2)}
    .btn-add:hover{transform:translateY(-1px);box-shadow:0 0 28px rgba(79,110,247,.4)}
    .btn-msg{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .15s;background:transparent;border:1px solid var(--b3);color:var(--text)}
    .btn-msg:hover{background:var(--b2)}
    /* EDIT FORM */
    .edit-form{background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:24px;margin-bottom:32px;display:none}
    .edit-form.show{display:block}
    .edit-form h3{font-size:15px;font-weight:800;margin-bottom:18px}
    .ef-field{margin-bottom:14px}
    .ef-field label{display:block;font-size:10px;font-weight:700;color:var(--sub);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase}
    .ef-field input,.ef-field textarea{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:9px;padding:10px 12px;color:var(--text);font-size:13px;outline:none;font-family:var(--sans);transition:border-color .15s;resize:none}
    .ef-field input:focus,.ef-field textarea:focus{border-color:rgba(79,110,247,.4)}
    .ef-field input::placeholder,.ef-field textarea::placeholder{color:var(--sub)}
    .ef-btns{display:flex;gap:8px;margin-top:4px}
    .ef-save{padding:9px 20px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);background:var(--a1);border:none;color:#fff;transition:all .15s}
    .ef-save:hover{background:#3d5df0}
    .ef-cancel{padding:9px 20px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);background:var(--b2);border:none;color:var(--text);transition:all .15s}
    .ef-cancel:hover{background:var(--b3)}
    /* PROJECTS */
    .section-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:16px}
    .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
    .proj-card{background:var(--s1);border:1px solid var(--b1);border-radius:13px;overflow:hidden;cursor:pointer;transition:all .2s;animation:fadeUp .3s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .proj-card:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
    .proj-thumb{height:100px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:40px;border-bottom:1px solid var(--b1);position:relative;overflow:hidden}
    .proj-thumb::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(79,110,247,.05),rgba(155,121,252,.03))}
    .proj-body{padding:12px 13px}
    .proj-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .proj-meta{font-size:10px;color:var(--sub);font-family:var(--mono);margin-top:3px}
    .empty-state{text-align:center;padding:48px;font-size:13px;color:var(--sub)}
    .spinner{width:18px;height:18px;border:2px solid var(--b2);border-top-color:var(--a1);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:11px 18px;font-size:12px;display:flex;align-items:center;gap:10px;transform:translateY(60px);opacity:0;transition:all .25s;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:none}
    .toast.show{transform:translateY(0);opacity:1}
  </style>
</head>
<body>
<nav>
  <a href="home.html" class="nav-logo">
    <img src="vexium_logo.png" alt="V"/>
    <span class="nav-logo-t">VEXIUM<span class="g">.AI</span></span>
  </a>
  <div class="nav-spacer"></div>
  <a href="home.html" class="nav-user">
    <div class="nav-user-av" id="navAv">?</div>
    <span id="navName">Home</span>
  </a>
</nav>

<main>
  <div id="loadingEl" style="display:flex;justify-content:center;padding:60px"><div class="spinner"></div></div>
  <div id="profContent" style="display:none">
    <div class="prof-header">
      <div class="prof-av-wrap">
        <div class="prof-av" id="profAv">?</div>
        <div class="prof-av-edit" id="avEditBtn" style="display:none" title="Change avatar emoji">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
      </div>
      <div class="prof-info">
        <div class="prof-username" id="profUsername">@—</div>
        <div class="prof-bio" id="profBio"><span class="prof-bio-empty">No bio yet.</span></div>
        <div class="prof-stats">
          <div class="prof-stat"><div class="prof-stat-n" id="profProjCount">0</div><div class="prof-stat-l">Projects</div></div>
          <div class="prof-stat"><div class="prof-stat-n" id="profFriendCount">0</div><div class="prof-stat-l">Friends</div></div>
        </div>
        <div class="prof-actions" id="profActions"></div>
      </div>
    </div>

    <div class="edit-form" id="editForm">
      <h3>Edit Profile</h3>
      <div class="ef-field">
        <label>Display Name</label>
        <input type="text" id="efDisplay" placeholder="Your name (optional)" maxlength="40"/>
      </div>
      <div class="ef-field">
        <label>Bio</label>
        <textarea id="efBio" rows="3" placeholder="Tell the community what you're building…" maxlength="200"></textarea>
      </div>
      <div class="ef-field">
        <label>Avatar Emoji</label>
        <input type="text" id="efEmoji" placeholder="🧑‍💻" maxlength="4"/>
      </div>
      <div class="ef-btns">
        <button class="ef-save" onclick="saveProfile()">Save changes</button>
        <button class="ef-cancel" onclick="toggleEditForm(false)">Cancel</button>
      </div>
    </div>

    <div class="section-label">Public Projects</div>
    <div class="proj-grid" id="projGrid"><div class="spinner"></div></div>
  </div>
</main>

<div class="toast" id="toast"><span id="toastIcon">✓</span> <span id="toastMsg"></span></div>

<script>
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentUser=null, viewProfile=null, isOwn=false;

  async function init() {
    const {data:{session}} = await sb.auth.getSession();
    currentUser = session?.user || null;
    if (currentUser) {
      document.getElementById('navAv').textContent = currentUser.user_metadata?.username?.[0]?.toUpperCase()||'?';
      document.getElementById('navName').textContent = '@'+(currentUser.user_metadata?.username||'me');
    }
    const params = new URLSearchParams(location.search);
    const username = params.get('user');
    if (!username && !currentUser) { location.href='auth.html'; return; }
    const lookupUser = username || currentUser?.user_metadata?.username || null;
    if (!lookupUser) { location.href='home.html'; return; }
    await loadProfile(lookupUser);
  }

  async function loadProfile(username) {
    const {data:prof} = await sb.from('profiles').select('*').eq('username',username).single();
    if (!prof) { document.getElementById('loadingEl').innerHTML='<div style="font-size:14px;color:var(--sub)">User not found.</div>'; return; }
    viewProfile = prof;
    isOwn = currentUser?.id === prof.id;
    renderProfile();
    await loadProjects();
    await loadFriendCount();
  }

  function renderProfile() {
    document.getElementById('loadingEl').style.display='none';
    document.getElementById('profContent').style.display='block';
    document.title = '@'+viewProfile.username+' — Vexium';
    const emoji = viewProfile.avatar_emoji && /\p{Emoji}/u.test(viewProfile.avatar_emoji) ? viewProfile.avatar_emoji : viewProfile.username[0].toUpperCase();
    const isEmoji = /\p{Emoji}/u.test(emoji);
    const av = document.getElementById('profAv');
    if (isEmoji) { av.style.fontSize='44px'; av.textContent=emoji; } else { av.style.fontSize='36px'; av.textContent=emoji; }
    document.getElementById('profUsername').textContent = '@'+viewProfile.username;
    const bioEl = document.getElementById('profBio');
    if (viewProfile.bio) { bioEl.textContent=viewProfile.bio; bioEl.className='prof-bio'; } else { bioEl.innerHTML='<span class="prof-bio-empty">No bio yet.</span>'; }
    const acts = document.getElementById('profActions');
    if (isOwn) {
      document.getElementById('avEditBtn').style.display='flex';
      document.getElementById('avEditBtn').onclick = promptAvatarEmoji;
      acts.innerHTML = `<button class="btn-edit" onclick="toggleEditForm(true)">Edit profile</button>`;
    } else {
      acts.innerHTML = `<button class="btn-add" id="friendBtn" onclick="handleFriendBtn()">Add friend</button>`;
      checkFriendStatus();
    }
    if (isOwn && viewProfile.bio) {
      document.getElementById('efBio').value = viewProfile.bio;
    }
    if (viewProfile.display_name) document.getElementById('efDisplay').value = viewProfile.display_name;
    if (viewProfile.avatar_emoji) document.getElementById('efEmoji').value = viewProfile.avatar_emoji;
  }

  async function loadProjects() {
    const el = document.getElementById('projGrid');
    const query = isOwn
      ? sb.from('projects').select('*').eq('user_id',viewProfile.id).order('updated_at',{ascending:false})
      : sb.from('projects').select('*').eq('user_id',viewProfile.id).eq('is_public',true).order('updated_at',{ascending:false});
    const {data} = await query;
    const list = data||[];
    document.getElementById('profProjCount').textContent = list.length;
    if (!list.length) { el.innerHTML='<div class="empty-state">No public projects yet.</div>'; return; }
    el.innerHTML = list.map((p,i)=>`
      <div class="proj-card" style="animation-delay:${i*.04}s" onclick="openProject('${esc(p.id)}')">
        <div class="proj-thumb"><span style="position:relative">${/\p{Emoji}/u.test(p.emoji||'')?p.emoji:'💻'}</span></div>
        <div class="proj-body"><div class="proj-name">${esc(p.name||'Untitled')}</div><div class="proj-meta">${fmtDate(p.updated_at)}</div></div>
      </div>`).join('');
  }

  async function loadFriendCount() {
    const {data} = await sb.from('friendships').select('id').eq('status','accepted').or(`requester_id.eq.${viewProfile.id},addressee_id.eq.${viewProfile.id}`);
    document.getElementById('profFriendCount').textContent = data?.length||0;
  }

  async function checkFriendStatus() {
    if (!currentUser) return;
    const {data:fs} = await sb.from('friendships').select('*').or(`and(requester_id.eq.${currentUser.id},addressee_id.eq.${viewProfile.id}),and(requester_id.eq.${viewProfile.id},addressee_id.eq.${currentUser.id})`).maybeSingle();
    const btn = document.getElementById('friendBtn');
    if (!btn) return;
    if (!fs) { btn.textContent='Add friend'; btn.style.background=''; }
    else if (fs.status==='pending'&&fs.requester_id===currentUser.id) { btn.textContent='Pending'; btn.disabled=true; btn.style.background='var(--b2)'; btn.style.color='var(--sub)'; btn.style.boxShadow='none'; }
    else if (fs.status==='pending') { btn.textContent='Accept request'; }
    else { btn.textContent='✓ Friends'; btn.disabled=true; btn.style.background='var(--b2)'; btn.style.boxShadow='none'; btn.style.color='var(--a3)'; }
  }

  async function handleFriendBtn() {
    if (!currentUser) { location.href='auth.html'; return; }
    const {data:prof} = await sb.from('profiles').select('*').eq('id',currentUser.id).single();
    const {data:fs} = await sb.from('friendships').select('*').or(`and(requester_id.eq.${currentUser.id},addressee_id.eq.${viewProfile.id}),and(requester_id.eq.${viewProfile.id},addressee_id.eq.${currentUser.id})`).maybeSingle();
    if (!fs) {
      await sb.from('friendships').insert({requester_id:currentUser.id,addressee_id:viewProfile.id});
      await sb.from('notifications').insert({user_id:viewProfile.id,from_user_id:currentUser.id,type:'friend_request',message:(prof?.username||'Someone')+' sent you a friend request'});
      toast('✓','Friend request sent!');
    } else if (fs.status==='pending'&&fs.addressee_id===currentUser.id) {
      await sb.from('friendships').update({status:'accepted'}).eq('id',fs.id);
      toast('✓','Friend request accepted!');
    }
    checkFriendStatus(); loadFriendCount();
  }

  function toggleEditForm(show) {
    document.getElementById('editForm').classList.toggle('show',show);
  }

  async function saveProfile() {
    const bio = document.getElementById('efBio').value.trim();
    const emoji = document.getElementById('efEmoji').value.trim()||'🧑‍💻';
    const display = document.getElementById('efDisplay').value.trim();
    const {error} = await sb.from('profiles').update({bio,avatar_emoji:emoji,display_name:display}).eq('id',viewProfile.id);
    if (error) { toast('!','Error saving'); return; }
    viewProfile.bio=bio; viewProfile.avatar_emoji=emoji; viewProfile.display_name=display;
    renderProfile(); toggleEditForm(false); toast('✓','Profile saved');
  }

  function promptAvatarEmoji() {
    const e = prompt('Enter an emoji for your avatar:',viewProfile.avatar_emoji||'🧑‍💻');
    if (e !== null) {
      document.getElementById('efEmoji').value = e;
      saveProfile();
    }
  }

  function openProject(id) {
    if (isOwn) { localStorage.setItem('vexium_current_project',id); location.href='editor.html'; }
    else { window.open('viewer.html?project='+id,'_blank'); }
  }

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function fmtDate(v){if(!v)return'';const d=new Date(v),diff=Date.now()-d.getTime();if(diff<60000)return'just now';if(diff<3600000)return Math.floor(diff/60000)+'m ago';if(diff<86400000)return Math.floor(diff/3600000)+'h ago';return Math.floor(diff/86400000)+'d ago'}
  let toastT;
  function toast(icon,msg){clearTimeout(toastT);document.getElementById('toastIcon').textContent=icon;document.getElementById('toastMsg').textContent=msg;const el=document.getElementById('toast');el.classList.add('show');toastT=setTimeout(()=>el.classList.remove('show'),2500)}

  init();
</script>
</body>
</html>
