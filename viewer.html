<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vexium</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#fff;overflow:hidden}
    #frame{width:100%;height:100%;border:none;display:block}
    #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;font-family:system-ui,sans-serif;font-size:14px;color:#888}
  </style>
</head>
<body>
<div id="loading">Loading…</div>
<iframe id="frame" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups" style="display:none"></iframe>

<script src="config.js" onerror="window._noConfig=true"></script>
<script>
  let sb = null;
  try {
    if (!window._noConfig && typeof supabase !== 'undefined' && typeof SUPABASE_URL !== 'undefined') {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch(e) {}

  async function init() {
    const params = new URLSearchParams(location.search);
    const projectId = params.get('project');
    if (!projectId) { document.getElementById('loading').textContent = 'No project specified.'; return; }

    let project = null;

    if (sb) {
      try {
        const { data } = await sb.from('projects').select('*').eq('id', projectId).single();
        if (data) project = data;
      } catch(e) {}
    }
    if (!project) {
      try {
        const list = JSON.parse(localStorage.getItem('vexium_projects') || '[]');
        project = list.find(p => p.id === projectId) || null;
      } catch(e) {}
    }
    if (!project) { document.getElementById('loading').textContent = 'Project not found.'; return; }

    document.title = project.name || 'Vexium';

    const fileSystem = project.files || {};
    const mainFile = project.main_file || 'index.html';
    let html = fileSystem[mainFile] || '';

    Object.entries(fileSystem).forEach(([fn, content]) => {
      if (fn === mainFile || !content) return;
      if (fn.endsWith('.css')) {
        const safe = content.replace(/<\/style>/gi, '<\\/style>');
        html = html.replace(new RegExp(`<link[^>]+href=["']${escRe(fn)}["'][^>]*/?>`, 'gi'), `<style>${safe}</style>`);
      } else if (fn.endsWith('.js')) {
        const safe = content.replace(/<\/script>/gi, '<\\/script>');
        html = html.replace(new RegExp(`<script[^>]+src=["']${escRe(fn)}["'][^>]*>[\\s\\S]*?<\\/script>`, 'gi'), `<script>${safe}<\/script>`);
      }
    });

    const frame = document.getElementById('frame');
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open(); doc.write(html); doc.close();
    document.getElementById('loading').style.display = 'none';
    frame.style.display = 'block';
  }

  function escRe(s) { return s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'); }
  window.addEventListener('load', init);
</script>
</body>
</html>
