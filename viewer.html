<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vexium</title>
  <link rel="icon" type="image/png" href="logo_background.png"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#fff;overflow:hidden}
    #frame{width:100%;height:100%;border:none;display:none}
    #bkBanner{display:none;position:fixed;top:0;left:0;right:0;height:44px;z-index:9999;background:rgba(10,10,10,.96);backdrop-filter:blur(14px);align-items:center;justify-content:center;font-family:system-ui,sans-serif;}
    #bkBanner.show{display:flex}
    #bkDropBtn{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:none;border-radius:9px;color:rgba(255,255,255,.85);font-size:13px;font-family:system-ui,sans-serif;font-weight:500;padding:6px 12px 6px 14px;cursor:pointer;outline:none;transition:background .15s;}
    #bkDropBtn:hover{background:rgba(255,255,255,.12)}
    #bkDropBtn svg{width:13px;height:13px;stroke:rgba(255,255,255,.4);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:transform .2s;}
    #bkDropBtn.open svg{transform:rotate(180deg)}
    #bkDropMenu{position:fixed;top:52px;left:50%;transform:translateX(-50%);min-width:180px;background:#1a1a1a;border-radius:11px;padding:5px;box-shadow:0 8px 32px rgba(0,0,0,.6);display:none;flex-direction:column;gap:1px;z-index:10000;}
    #bkDropMenu.show{display:flex}
    .bk-drop-item{padding:8px 12px;border-radius:7px;font-size:13px;font-family:system-ui,sans-serif;color:rgba(255,255,255,.75);cursor:pointer;transition:background .12s;white-space:nowrap;}
    .bk-drop-item:hover{background:rgba(255,255,255,.08);color:#fff}
    .bk-drop-item.active{color:#fff;font-weight:600}
    #frame.bk-mode{height:calc(100% - 44px);margin-top:44px}

    /* ── LOADING ── */
    #loading{
      position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:12px;
      background:#fff;font-family:system-ui,sans-serif;font-size:14px;color:#888;
      transition:opacity .3s ease;
    }
    #loading .ld-dots span{
      display:inline-block;width:6px;height:6px;border-radius:50%;
      background:#c4b5fd;margin:0 3px;
      animation:ldot .9s ease-in-out infinite;
    }
    #loading .ld-dots span:nth-child(2){animation-delay:.15s}
    #loading .ld-dots span:nth-child(3){animation-delay:.3s}
    @keyframes ldot{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

    /* ── NOT FOUND ── */
    #notFound{
      position:fixed;inset:0;display:none;flex-direction:column;
      align-items:center;justify-content:center;gap:0;
      background:#fff;
    }
    #notFound.show{display:flex;}
    #notFound img{
      width:clamp(80px,10vw,140px);height:clamp(80px,10vw,140px);
      opacity:0;
      animation:nfFade .5s ease .1s forwards;
      transform-origin:center center;
      transition:transform 60ms ease-out;
    }
    #notFound img:hover{transform:scale(1.08) translateY(0)}
    #notFound p{
      font-family:system-ui,sans-serif;
      font-size:clamp(14px,1.8vw,22px);
      color:#bbb;
      margin-top:clamp(16px,2.5vw,32px);
      letter-spacing:.01em;
      opacity:0;
      animation:nfFade .5s ease .4s forwards;
    }
    @keyframes nfFade{
      from{opacity:0;transform:translateY(6px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>

<div id="bkBanner">
  <button id="bkDropBtn" onclick="bkToggleDrop()">
    <span id="bkDropLabel">Home page</span>
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
  <div id="bkDropMenu"></div>
</div>

<div id="loading">
  <div class="ld-dots"><span></span><span></span><span></span></div>
  <span>Loading…</span>
</div>

<div id="notFound">
  <img src="vexium_logo_black.png" alt="Vexium"/>
  <p>No project found.</p>
</div>

<iframe id="frame" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"></iframe>

<script src="config.js" onerror="window._noConfig=true"></script>
<script>
  let sb = null;
  try {
    if (!window._noConfig && typeof supabase !== 'undefined' && typeof SUPABASE_URL !== 'undefined') {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch(e) {}

  let fileSystem = {};

  function bkHumanName(filename) {
    const base = filename.split('/').pop();
    const dot = base.lastIndexOf('.');
    const raw = dot >= 0 ? base.slice(0, dot) : base;
    const specials = { index:'Home', main:'Main', app:'App', style:'Styles', styles:'Styles',
      global:'Global', about:'About', contact:'Contact', blog:'Blog', pricing:'Pricing',
      dashboard:'Dashboard', login:'Login', signup:'Sign up', landing:'Landing',
      portfolio:'Portfolio', shop:'Shop', store:'Store' };
    const pretty = specials[raw.toLowerCase()] ||
      raw.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    return pretty + ' page';
  }

  function escRe(s) { return s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'); }

  function showNotFound() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('notFound').classList.add('show');
  }

  function buildPageHtml(pageName) {
    let html = fileSystem[pageName] || '';

    // Substitute project ID placeholder so backend calls work
    const projectId = new URLSearchParams(location.search).get('project') || '';
    if (projectId) html = html.split('{{VEXIUM_PROJECT_ID}}').join(projectId);

    const isImgFile = fn => /\.(png|jpe?g|gif|webp|svg|ico|bmp)$/i.test(fn);

    // Pass 1: inline CSS/JS so url() refs inside CSS are present before image substitution
    Object.entries(fileSystem).forEach(([fn, fc]) => {
      if (!fc || fn === pageName || isImgFile(fn)) return;
      if (projectId && typeof fc === 'string') fc = fc.split('{{VEXIUM_PROJECT_ID}}').join(projectId);
      const safe = escRe(fn);
      if (fn.endsWith('.css')) {
        const inlined = fc.replace(/<\/style>/gi, '<\\/style>');
        html = html.replace(
          new RegExp(`<link[^>]+href=["']${safe}["'][^>]*/?>`, 'gi'),
          '<style>' + inlined + '<' + '/style>'
        );
      } else if (fn.endsWith('.js')) {
        const inlined = fc.replace(/<\/script>/gi, '<\\/script>');
        html = html.replace(
          new RegExp(`<script[^>]+src=["']${safe}["'][^>]*>[\\s\\S]*?<\\/script>`, 'gi'),
          '<script>' + inlined + '<' + '/script>'
        );
      }
    });

    // Pass 2: substitute image data URLs (now also catches url() inside inlined CSS)
    Object.entries(fileSystem).forEach(([fn, fc]) => {
      if (!fc || fn === pageName || !isImgFile(fn)) return;
      if (typeof fc !== 'string' || !fc.startsWith('data:')) return;
      const safe = escRe(fn);
      html = html.replace(new RegExp(`(src=["'])${safe}(["'])`, 'gi'), `$1${fc}$2`);
      html = html.replace(new RegExp(`url\\(["']?${safe}["']?\\)`, 'gi'), `url(${fc})`);
    });

    // Rewrite anchor links to use hash navigation — same approach as editor preview
    Object.keys(fileSystem).filter(f => f.endsWith('.html') && !f.startsWith('_') && f !== pageName).forEach(target => {
      [target, './' + target].forEach(variant => {
        const dq = 'href="' + variant + '"';
        const sq = "href='" + variant + "'";
        while (html.includes(dq)) html = html.replace(dq, 'href="#vexnav=' + target + '"');
        while (html.includes(sq)) html = html.replace(sq, "href='#vexnav=" + target + "'");
      });
    });

    // Inject JS nav interceptor for window.location.href = '...' navigation
    const interceptor = `(function(){if(!location.href.startsWith('blob:'))return;function _nav(u){var s=String(u||'');if(!s||s.startsWith('http')||s.startsWith('//')||s.startsWith('#')||s.startsWith('blob:')||s.startsWith('javascript:'))return false;var p=s.split('?')[0].split('#')[0];while(p.startsWith('./'))p=p.slice(2);while(p.startsWith('/'))p=p.slice(1);if(!p)return false;if(p.indexOf('.')===-1)p=p+'.html';location.hash='vexnav='+p;return true;}try{var d=Object.getOwnPropertyDescriptor(Location.prototype,'href');if(d&&d.set)Object.defineProperty(Location.prototype,'href',{get:d.get,set:function(u){if(!_nav(u))d.set.call(this,u);}});}catch(e){}})();`;
    const bridge = '<script>' + interceptor + '<' + '/script>';
    if (/<head[^>]*>/i.test(html)) {
      html = html.replace(/(<head[^>]*>)/i, '$1' + bridge);
    } else {
      html = bridge + html;
    }

    return html;
  }

  function renderPage(pageName) {
    const frame = document.getElementById('frame');
    const html = buildPageHtml(pageName);
    const prev = frame._blob;
    if (prev) URL.revokeObjectURL(prev);
    const blob = new Blob([html], { type: 'text/html' });
    const burl = URL.createObjectURL(blob);
    frame._blob = burl;
    frame.src = burl;
    const titleMatch = html.match(/<title>([^<]*)<\/title>/i);
    if (titleMatch) document.title = titleMatch[1] || document.title;
    // Re-attach hash navigation listener after each page load
    frame.onload = function() {
      try {
        frame.contentWindow.addEventListener('hashchange', function() {
          const h = frame.contentWindow.location.hash || '';
          if (h.startsWith('#vexnav=')) {
            const pg = decodeURIComponent(h.slice(8));
            if (pg && fileSystem[pg]) renderPage(pg);
          }
        });
      } catch(e) {}
    };
  }

  window.addEventListener('message', function(e) {
    if (e.data?.type !== 'vexium_navigate') return;
    const page = e.data.page;
    if (page && fileSystem[page]) renderPage(page);
  });

  async function init() {
    const params = new URLSearchParams(location.search);
    const backupId = params.get('backup');
    const frame = document.getElementById('frame');

    frame.addEventListener('load', function() {
      document.getElementById('loading').style.display = 'none';
      frame.style.display = 'block';
    }, { once: false });

    // ── Backup preview mode ───────────────────────────────────────
    if (backupId && sb) {
      try {
        const { data: bk } = await sb.from('project_backups').select('*').eq('id', backupId).single();
        if (!bk) { showNotFound(); return; }
        fileSystem = bk.files || {};
        const pages = Object.keys(fileSystem).filter(f => f.endsWith('.html') && !f.startsWith('_')).sort((a,b) => a === 'index.html' ? -1 : b === 'index.html' ? 1 : a.localeCompare(b));
        window._bkPages = pages;
        window._bkCurrentPage = pages[0] || 'index.html';
        bkBuildMenu();
        document.getElementById('bkBanner').classList.add('show');
        frame.classList.add('bk-mode');
        document.title = 'Backup preview';
        renderPage(window._bkCurrentPage);
      } catch(e) { showNotFound(); }
      return;
    }

    // ── Normal project mode ───────────────────────────────────────
    const projectId = params.get('project');
    if (!projectId) { showNotFound(); return; }

    let project = null;
    if (sb) {
      try {
        const { data } = await sb.from('projects').select('*').eq('id', projectId).single();
        if (data) project = data;
      } catch(e) {}
    }
    if (!project) {
      try {
        const list = JSON.parse(localStorage.getItem('vexium_projects') || '[]');
        project = list.find(p => p.id === projectId) || null;
      } catch(e) {}
    }
    if (!project) { showNotFound(); return; }

    document.title = project.name || 'Vexium';
    fileSystem = project.files || {};
    const mainFile = project.main_file || 'index.html';
    const requestedPage = params.get('page');
    const startFile = (requestedPage && project.files?.[requestedPage]) ? requestedPage : mainFile;

    renderPage(startFile);

    // Track this site open
    (function(){
      try {
        var sid = sessionStorage.getItem('_vsid') || Math.random().toString(36).slice(2);
        sessionStorage.setItem('_vsid', sid);
        var vid = localStorage.getItem('_vvid') || Math.random().toString(36).slice(2);
        localStorage.setItem('_vvid', vid);
        fetch('https://ciuqhxrxcznmgorjeumz.supabase.co/functions/v1/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project_id: projectId, page: '/', referrer: document.referrer, session_id: sid, visitor_id: vid })
        }).catch(function(){});
      } catch(e) {}
    })();
  }

  function bkBuildMenu() {
    const pages = window._bkPages || [];
    const menu = document.getElementById('bkDropMenu');
    const label = document.getElementById('bkDropLabel');
    if (label) label.textContent = bkHumanName(window._bkCurrentPage || pages[0] || 'index.html');
    if (menu) menu.innerHTML = pages.map(p =>
      `<div class="bk-drop-item${p === window._bkCurrentPage ? ' active' : ''}" onclick="bkNavTo('${p}')">${bkHumanName(p)}</div>`
    ).join('');
  }

  function bkToggleDrop() {
    const menu = document.getElementById('bkDropMenu');
    const btn = document.getElementById('bkDropBtn');
    const open = menu.classList.toggle('show');
    btn.classList.toggle('open', open);
  }

  function bkNavTo(page) {
    window._bkCurrentPage = page;
    document.getElementById('bkDropMenu').classList.remove('show');
    document.getElementById('bkDropBtn').classList.remove('open');
    document.getElementById('bkDropLabel').textContent = bkHumanName(page);
    document.querySelectorAll('.bk-drop-item').forEach(el => el.classList.toggle('active', el.textContent === bkHumanName(page)));
    renderPage(page);
  }

  document.addEventListener('click', e => {
    if (!document.getElementById('bkDropBtn')?.contains(e.target) && !document.getElementById('bkDropMenu')?.contains(e.target)) {
      document.getElementById('bkDropMenu')?.classList.remove('show');
      document.getElementById('bkDropBtn')?.classList.remove('open');
    }
  });

  window.addEventListener('load', init);
</script>
</body>
</html>
