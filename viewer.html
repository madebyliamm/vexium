<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vexium</title>
  <link rel="icon" type="image/png" href="logo_background.png"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#fff;overflow:hidden}
    #frame{width:100%;height:100%;border:none;display:none}

    /* ── LOADING ── */
    #loading{
      position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:12px;
      background:#fff;font-family:system-ui,sans-serif;font-size:14px;color:#888;
      transition:opacity .3s ease;
    }
    #loading .ld-dots span{
      display:inline-block;width:6px;height:6px;border-radius:50%;
      background:#c4b5fd;margin:0 3px;
      animation:ldot .9s ease-in-out infinite;
    }
    #loading .ld-dots span:nth-child(2){animation-delay:.15s}
    #loading .ld-dots span:nth-child(3){animation-delay:.3s}
    @keyframes ldot{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

    /* ── NOT FOUND ── */
    #notFound{
      position:fixed;inset:0;display:none;flex-direction:column;
      align-items:center;justify-content:center;gap:0;
      background:#fff;
    }
    #notFound.show{display:flex;}
    #notFound img{
      width:clamp(80px,10vw,140px);height:clamp(80px,10vw,140px);
      opacity:0;
      animation:nfFade .5s ease .1s forwards;
      transform-origin:center center;
      transition:transform 60ms ease-out;
    }
    #notFound img:hover{transform:scale(1.08) translateY(0)}
    #notFound p{
      font-family:system-ui,sans-serif;
      font-size:clamp(14px,1.8vw,22px);
      color:#bbb;
      margin-top:clamp(16px,2.5vw,32px);
      letter-spacing:.01em;
      opacity:0;
      animation:nfFade .5s ease .4s forwards;
    }
    @keyframes nfFade{
      from{opacity:0;transform:translateY(6px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="ld-dots"><span></span><span></span><span></span></div>
  <span>Loading project…</span>
</div>

<div id="notFound">
  <img src="vexium_logo_black.png" alt="Vexium"/>
  <p>No project found.</p>
</div>

<iframe id="frame" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"></iframe>

<script src="config.js" onerror="window._noConfig=true"></script>
<script>
  let sb = null;
  try {
    if (!window._noConfig && typeof supabase !== 'undefined' && typeof SUPABASE_URL !== 'undefined') {
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch(e) {}

  let fileSystem = {};

  function escRe(s) { return s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'); }

  function showNotFound() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('notFound').classList.add('show');
  }

  function buildPageHtml(pageName) {
    let html = fileSystem[pageName] || '';

    // Substitute project ID placeholder so backend calls work
    const projectId = new URLSearchParams(location.search).get('project') || '';
    if (projectId) html = html.split('{{VEXIUM_PROJECT_ID}}').join(projectId);

    Object.entries(fileSystem).forEach(([fn, fc]) => {
      if (!fc || fn === pageName) return;
      if (projectId && typeof fc === 'string') fc = fc.split('{{VEXIUM_PROJECT_ID}}').join(projectId);
      const safe = escRe(fn);
      if (fn.endsWith('.css')) {
        const inlined = fc.replace(/<\/style>/gi, '<\\/style>');
        html = html.replace(
          new RegExp(`<link[^>]+href=["']${safe}["'][^>]*/?>`, 'gi'),
          '<style>' + inlined + '<' + '/style>'
        );
      } else if (fn.endsWith('.js')) {
        const inlined = fc.replace(/<\/script>/gi, '<\\/script>');
        html = html.replace(
          new RegExp(`<script[^>]+src=["']${safe}["'][^>]*>[\\s\\S]*?<\\/script>`, 'gi'),
          '<script>' + inlined + '<' + '/script>'
        );
      }
    });

    const interceptor = `(function(){
      document.addEventListener('click', function(e) {
        var a = e.target.closest('a');
        if (!a) return;
        var href = a.getAttribute('href') || '';
        if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto') || href.startsWith('tel')) return;
        var page = href.split('?')[0].split('#')[0];
        if (!page) return;
        e.preventDefault();
        window.parent.postMessage({ type: 'vexium_navigate', page: page }, '*');
      });
    })();`;

    const bridge = '<script>' + interceptor + '<' + '/script>';
    if (/<head[^>]*>/i.test(html)) {
      html = html.replace(/(<head[^>]*>)/i, '$1' + bridge);
    } else {
      html = bridge + html;
    }
    return html;
  }

  function renderPage(pageName) {
    const frame = document.getElementById('frame');
    const html = buildPageHtml(pageName);
    const prev = frame._blob;
    if (prev) URL.revokeObjectURL(prev);
    const blob = new Blob([html], { type: 'text/html' });
    const burl = URL.createObjectURL(blob);
    frame._blob = burl;
    frame.src = burl;
    const titleMatch = html.match(/<title>([^<]*)<\/title>/i);
    if (titleMatch) document.title = titleMatch[1] || document.title;
  }

  window.addEventListener('message', function(e) {
    if (e.data?.type !== 'vexium_navigate') return;
    const page = e.data.page;
    if (page && fileSystem[page]) renderPage(page);
  });

  async function init() {
    const params = new URLSearchParams(location.search);
    const projectId = params.get('project');
    if (!projectId) { showNotFound(); return; }

    let project = null;

    if (sb) {
      try {
        const { data } = await sb.from('projects').select('*').eq('id', projectId).single();
        if (data) project = data;
      } catch(e) {}
    }
    if (!project) {
      try {
        const list = JSON.parse(localStorage.getItem('vexium_projects') || '[]');
        project = list.find(p => p.id === projectId) || null;
      } catch(e) {}
    }
    if (!project) { showNotFound(); return; }

    document.title = project.name || 'Vexium';
    fileSystem = project.files || {};
    const mainFile = project.main_file || 'index.html';

    const frame = document.getElementById('frame');
    frame.addEventListener('load', function() {
      document.getElementById('loading').style.display = 'none';
      frame.style.display = 'block';
    }, { once: false });

    renderPage(mainFile);

    // Track this site open
    (function(){
      try {
        var sid = sessionStorage.getItem('_vsid') || Math.random().toString(36).slice(2);
        sessionStorage.setItem('_vsid', sid);
        var vid = localStorage.getItem('_vvid') || Math.random().toString(36).slice(2);
        localStorage.setItem('_vvid', vid);
        fetch('https://ciuqhxrxcznmgorjeumz.supabase.co/functions/v1/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project_id: projectId, page: '/', referrer: document.referrer, session_id: sid, visitor_id: vid })
        }).catch(function(){});
      } catch(e) {}
    })();
  }

  window.addEventListener('load', init);
</script>
</body>
</html>
